<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" fill="none">
  <title>Curio - Install pack (permissions)</title>
  <desc>Modal after Install click. SketchUp-style disclosure before enabling.</desc>
  <defs>
    <style type="text/css">
      .font { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif; }
      .t-title { font-size: 20px; font-weight: 700; fill: #0F0F11; }
      .t-body { font-size: 14px; font-weight: 400; fill: #434548; }
      .t-meta { font-size: 12px; font-weight: 400; fill: #747474; }
      .t-btn { font-size: 14px; font-weight: 600; fill: #FFFFFF; }
      .t-btn-sec { font-size: 14px; font-weight: 600; fill: #0F0F11; }
      .t-section { font-size: 11px; font-weight: 600; fill: #747474; letter-spacing: 0.05em; }
    </style>
    <filter id="modalShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect id="Dim_Backdrop" width="1440" height="900" fill="#0F0F11" opacity="0.45"/>

  <g id="Modal_Install" filter="url(#modalShadow)" transform="translate(420,200)">
    <rect width="600" height="500" rx="12" fill="#FFFFFF" stroke="#E0E0E2" stroke-width="1"/>
    <g id="Modal_Close" transform="translate(556,16)">
      <circle cx="10" cy="10" r="14" fill="#F3F3F4"/>
      <line x1="5" y1="5" x2="15" y2="15" stroke="#434548" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="15" y1="5" x2="5" y2="15" stroke="#434548" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <text class="font t-title" x="32" y="52">Install "UHVI heat layers"?</text>
    <text class="font t-meta" x="32" y="78">Urban Lab - v2.1.0 - You can uninstall anytime from My nodes.</text>

    <rect x="32" y="100" width="536" height="1" fill="#E0E0E2"/>

    <text class="font t-section" x="32" y="130">This pack will be allowed to</text>

    <g id="Perm_Row_File" transform="translate(32,148)">
      <circle cx="8" cy="8" r="10" fill="#E8F5E9"/>
      <path d="M4 8 L7 11 L12 4" stroke="#2E7D32" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text class="font t-body" x="28" y="13">Read files you open in Curio (dataflow inputs)</text>
    </g>
    <g id="Perm_Row_Net" transform="translate(32,182)">
      <circle cx="8" cy="8" r="10" fill="#FFF3E0"/>
      <text class="font t-body" text-anchor="middle" x="8" y="12" font-size="11" font-weight="700" fill="#E65100">!</text>
      <text class="font t-body" x="28" y="13" fill="#434548">Optional: network access for listed endpoints in manifest</text>
    </g>
    <g id="Perm_Row_Exec" transform="translate(32,216)">
      <circle cx="8" cy="8" r="10" fill="#E8F5E9"/>
      <path d="M4 8 L7 11 L12 4" stroke="#2E7D32" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text class="font t-body" x="28" y="13">Run Python in the Curio sandbox (stdlib + declared deps only)</text>
    </g>
    <g id="Perm_Row_Node" transform="translate(32,250)">
      <circle cx="8" cy="8" r="10" fill="#E8F5E9"/>
      <path d="M4 8 L7 11 L12 4" stroke="#2E7D32" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text class="font t-body" x="28" y="13">Register 3 new node kinds in your palette (UrbanHeatLoad, MergeThermal, SummaryCard)</text>
    </g>

    <rect x="32" y="292" width="536" height="1" fill="#E0E0E2"/>

    <text class="font t-section" x="32" y="322">Dependencies</text>
    <text class="font t-body" x="32" y="346">None required beyond Curio runtime 1.4</text>

    <g id="Trust_Link" transform="translate(32,372)">
      <text class="font t-meta" fill="#0F0F11" text-decoration="underline">View manifest and checksum</text>
    </g>

    <g id="Actions" transform="translate(32,412)">
      <g id="Btn_Cancel" transform="translate(284,0)">
        <rect width="120" height="44" rx="6" fill="#FFFFFF" stroke="#747474" stroke-width="1.5"/>
        <text class="font t-btn-sec" x="36" y="29">Cancel</text>
      </g>
      <g id="Btn_Install_Confirm" transform="translate(416,0)">
        <rect width="184" height="44" rx="6" fill="#0F0F11"/>
        <text class="font t-btn" x="44" y="29">Install pack</text>
      </g>
    </g>

    <text class="font t-meta" x="32" y="480">By continuing you agree this pack is from a source you trust.</text>
  </g>
</svg>
