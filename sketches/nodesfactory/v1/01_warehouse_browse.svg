<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" fill="none">
  <title>Curio - Node warehouse (browse)</title>
  <desc>Figma-ready mock: SketchUp Extension Warehouse pattern. Layer groups use stable ids.</desc>
  <defs>
    <style type="text/css">
      .font { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif; }
      .t-nav { font-size: 13px; font-weight: 500; fill: #FFFFFF; }
      .t-nav-dim { font-size: 13px; font-weight: 500; fill: #9A9A9E; }
      .t-page-title { font-size: 28px; font-weight: 700; fill: #0F0F11; }
      .t-section { font-size: 11px; font-weight: 600; fill: #747474; letter-spacing: 0.06em; text-transform: uppercase; }
      .t-cat { font-size: 14px; font-weight: 500; fill: #0F0F11; }
      .t-cat-muted { font-size: 14px; font-weight: 400; fill: #434548; }
      .t-card-title { font-size: 15px; font-weight: 600; fill: #0F0F11; }
      .t-meta { font-size: 12px; font-weight: 400; fill: #747474; }
      .t-chip { font-size: 12px; font-weight: 500; fill: #0F0F11; }
      .t-placeholder { font-size: 14px; font-weight: 400; fill: #7F7F7F; }
    </style>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <g id="Frame">
    <rect id="Frame_Background" width="1440" height="900" fill="#ECECEE"/>

    <g id="Header_App">
      <rect id="Header_App_Bg" width="1440" height="56" fill="#0F0F11"/>
      <text class="font t-nav" x="24" y="35">Curio</text>
      <g id="Header_App_Menu" transform="translate(120,0)">
        <text class="font t-nav-dim" x="0" y="35">File</text>
        <text class="font t-nav-dim" x="52" y="35">View</text>
        <text class="font t-nav-dim" x="108" y="35">Data</text>
      </g>
      <g id="Header_App_User" transform="translate(1320,0)">
        <circle cx="86" cy="28" r="14" fill="#434548"/>
        <text class="font t-nav" text-anchor="middle" x="86" y="33" font-size="10" font-weight="600">SG</text>
      </g>
    </g>

    <g id="Warehouse_Chrome" transform="translate(0,56)">
      <rect width="1440" height="844" fill="#F7F7F8"/>

      <g id="Warehouse_TopBar">
        <rect width="1440" height="88" fill="#FFFFFF"/>
        <line x1="0" y1="88" x2="1440" y2="88" stroke="#E0E0E2" stroke-width="1"/>
        <text class="font t-page-title" x="24" y="48">Node warehouse</text>
        <text class="font t-meta" x="24" y="72">Browse and install packs - community and partner nodes for your dataflows.</text>

        <g id="Search_Field" transform="translate(520,24)">
          <rect width="420" height="44" rx="6" fill="#FFFFFF" stroke="#747474" stroke-width="1.5"/>
          <circle cx="40" cy="22" r="8" stroke="#747474" stroke-width="1.5" fill="none"/>
          <line x1="46" y1="28" x2="52" y2="34" stroke="#747474" stroke-width="1.5" stroke-linecap="round"/>
          <text class="font t-placeholder" x="64" y="30">Search packs, authors, tags...</text>
        </g>

        <g id="Btn_ImportPack" transform="translate(1160,28)">
          <rect width="140" height="40" rx="6" fill="#FFFFFF" stroke="#0F0F11" stroke-width="1.5"/>
          <text class="font t-chip" x="28" y="26">Import .pack</text>
        </g>
        <g id="Btn_MyNodes" transform="translate(1310,28)">
          <rect width="106" height="40" rx="6" fill="#0F0F11"/>
          <text class="font t-nav" x="22" y="26" font-size="13px">My nodes</text>
        </g>
      </g>

      <g id="CategoryRail" transform="translate(0,144)">
        <rect width="240" height="700" fill="#EFEFEF"/>
        <line x1="240" y1="0" x2="240" y2="700" stroke="#D8D8D8" stroke-width="1"/>
        <text class="font t-section" x="20" y="36">Categories</text>
        <g id="Cat_All" transform="translate(12,52)">
          <rect width="216" height="40" rx="6" fill="#0F0F11"/>
          <text class="font t-cat" x="16" y="26" fill="#FFFFFF">All packs</text>
        </g>
        <text class="font t-cat-muted" x="28" y="118">Data and I/O</text>
        <text class="font t-cat-muted" x="28" y="150">Geospatial</text>
        <text class="font t-cat-muted" x="28" y="182">Analysis</text>
        <text class="font t-cat-muted" x="28" y="214">Visualization</text>
        <text class="font t-cat-muted" x="28" y="246">Partner</text>
        <text class="font t-cat-muted" x="28" y="278">Experimental</text>

        <text class="font t-section" x="20" y="340">Filters</text>
        <g id="Filter_Compatible" transform="translate(16,356)">
          <rect x="0" y="0" width="18" height="18" rx="3" fill="#0F0F11"/>
          <path d="M4 9 L8 13 L14 5" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text class="font t-meta" x="26" y="15" fill="#434548">Compatible only</text>
        </g>
      </g>

      <!-- Main: 264..1119 = 856px wide; 3 cols x 260 + 2 gaps 28 -->
      <g id="Main_Content" transform="translate(264,156)">
        <g id="Filter_Chips">
          <g id="Chip_Featured">
            <rect width="88" height="32" rx="16" fill="#0F0F11"/>
            <text class="font t-chip" x="20" y="21" fill="#FFFFFF">Featured</text>
          </g>
          <g id="Chip_Recent" transform="translate(100,0)">
            <rect width="76" height="32" rx="16" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1"/>
            <text class="font t-chip" x="16" y="21">Recent</text>
          </g>
          <g id="Chip_TopRated" transform="translate(188,0)">
            <rect width="96" height="32" rx="16" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1"/>
            <text class="font t-chip" x="16" y="21">Top rated</text>
          </g>
        </g>

        <g id="CardGrid" transform="translate(0,52)">
          <g id="Card_01" filter="url(#cardShadow)">
            <rect width="260" height="208" rx="10" fill="#FFFFFF" stroke="#E0E0E2" stroke-width="1"/>
            <rect x="12" y="12" width="236" height="112" rx="6" fill="#E8E8EA"/>
            <text class="font t-meta" x="24" y="74">Thumbnail</text>
            <text class="font t-card-title" x="16" y="148">UHVI heat layers</text>
            <text class="font t-meta" x="16" y="168">Urban Lab - v2.1.0</text>
            <text class="font t-meta" x="16" y="186">4/5 - 1.2k installs</text>
            <g id="Card_01_Install" transform="translate(168,162)">
              <rect width="80" height="32" rx="6" fill="#0F0F11"/>
              <text class="font t-nav" x="22" y="22" font-size="12px">Install</text>
            </g>
          </g>

          <g id="Card_02" transform="translate(288,0)" filter="url(#cardShadow)">
            <rect width="260" height="208" rx="10" fill="#FFFFFF" stroke="#E0E0E2" stroke-width="1"/>
            <rect x="12" y="12" width="236" height="112" rx="6" fill="#E8E8EA"/>
            <text class="font t-meta" x="24" y="74">Thumbnail</text>
            <text class="font t-card-title" x="16" y="148">OSM extract toolkit</text>
            <text class="font t-meta" x="16" y="168">Community - v1.0.4</text>
            <text class="font t-meta" x="16" y="186">5/5 - 3.4k installs</text>
            <g transform="translate(168,162)">
              <rect width="80" height="32" rx="6" fill="#0F0F11"/>
              <text class="font t-nav" x="22" y="22" font-size="12px">Install</text>
            </g>
          </g>

          <g id="Card_03" transform="translate(576,0)" filter="url(#cardShadow)">
            <rect width="260" height="208" rx="10" fill="#FFFFFF" stroke="#E0E0E2" stroke-width="1"/>
            <rect x="12" y="12" width="236" height="112" rx="6" fill="#E8E8EA"/>
            <text class="font t-meta" x="24" y="74">Thumbnail</text>
            <text class="font t-card-title" x="16" y="148">Raster stats pack</text>
            <text class="font t-meta" x="16" y="168">GeoPartner - v4.2.0</text>
            <text class="font t-meta" x="16" y="186">3/5 - 640 installs</text>
            <g transform="translate(160,162)">
              <rect width="88" height="32" rx="6" fill="#FFFFFF" stroke="#0F0F11" stroke-width="1.5"/>
              <text class="font t-chip" x="18" y="22" font-size="12px">Installed</text>
            </g>
          </g>

          <g id="Card_04" transform="translate(0,228)" filter="url(#cardShadow)">
            <rect width="260" height="208" rx="10" fill="#FFFFFF" stroke="#E0E0E2" stroke-width="1"/>
            <rect x="12" y="12" width="236" height="112" rx="6" fill="#E8E8EA"/>
            <text class="font t-meta" x="24" y="74">Thumbnail</text>
            <text class="font t-card-title" x="16" y="148">Vega themes (dark)</text>
            <text class="font t-meta" x="16" y="168">VizKit - v0.9.2</text>
            <text class="font t-meta" x="16" y="186">4/5 - 210 installs</text>
            <g transform="translate(168,162)">
              <rect width="80" height="32" rx="6" fill="#0F0F11"/>
              <text class="font t-nav" x="22" y="22" font-size="12px">Install</text>
            </g>
          </g>

          <g id="Card_05" transform="translate(288,228)" filter="url(#cardShadow)">
            <rect width="260" height="208" rx="10" fill="#FFFFFF" stroke="#E0E0E2" stroke-width="1"/>
            <rect x="12" y="12" width="236" height="112" rx="6" fill="#E8E8EA"/>
            <g id="Card_05_Badge_New" transform="translate(174,14)">
              <rect width="44" height="20" rx="4" fill="#C45C26"/>
              <text class="font t-nav" x="8" y="15" font-size="10px" font-weight="600">NEW</text>
            </g>
            <text class="font t-meta" x="24" y="74">Thumbnail</text>
            <text class="font t-card-title" x="16" y="148">Sensitivity bundle</text>
            <text class="font t-meta" x="16" y="168">Labs (beta) - v0.3.1</text>
            <text class="font t-meta" x="16" y="186">4/5 - 92 installs</text>
            <g transform="translate(168,162)">
              <rect width="80" height="32" rx="6" fill="#0F0F11"/>
              <text class="font t-nav" x="22" y="22" font-size="12px">Install</text>
            </g>
          </g>

          <g id="Card_06" transform="translate(576,228)" filter="url(#cardShadow)">
            <rect width="260" height="208" rx="10" fill="#FFFFFF" stroke="#E0E0E2" stroke-width="1"/>
            <rect x="12" y="12" width="236" height="112" rx="6" fill="#E8E8EA"/>
            <text class="font t-meta" x="24" y="74">Thumbnail</text>
            <text class="font t-card-title" x="16" y="148">Export for QGIS</text>
            <text class="font t-meta" x="16" y="168">Partner A - v1.8.0</text>
            <text class="font t-meta" x="16" y="186">5/5 - 890 installs</text>
            <g transform="translate(168,162)">
              <rect width="80" height="32" rx="6" fill="#0F0F11"/>
              <text class="font t-nav" x="22" y="22" font-size="12px">Install</text>
            </g>
          </g>
        </g>
      </g>

      <g id="DetailDrawer" transform="translate(1120,144)">
        <rect width="320" height="700" fill="#FFFFFF"/>
        <line x1="0" y1="0" x2="0" y2="700" stroke="#D8D8D8" stroke-width="1"/>
        <text class="font t-cat" x="20" y="40" font-size="18" font-weight="700">UHVI heat layers</text>
        <text class="font t-meta" x="20" y="64">Urban Lab - v2.1.0 - MIT</text>
        <rect x="20" y="84" width="280" height="140" rx="8" fill="#EFEFEF"/>
        <text class="font t-meta" x="108" y="162">Hero preview</text>
        <text class="font t-meta" x="20" y="248" font-size="13px" fill="#434548">Adds nodes for land surface temperature import,</text>
        <text class="font t-meta" x="20" y="268" font-size="13px" fill="#434548">raster merge, and summary widgets.</text>
        <g id="Drawer_Install" transform="translate(20,288)">
          <rect width="280" height="44" rx="6" fill="#0F0F11"/>
          <text class="font t-nav" x="108" y="29" font-size="14px">Install</text>
        </g>
        <text class="font t-section" x="20" y="372">Dependencies</text>
        <text class="font t-meta" x="20" y="396">Curio runtime &gt;= 1.4</text>
        <text class="font t-section" x="20" y="432">Permissions</text>
        <text class="font t-meta" x="20" y="456">File read - Network (optional) - Python stdlib</text>
      </g>
    </g>
  </g>
</svg>
