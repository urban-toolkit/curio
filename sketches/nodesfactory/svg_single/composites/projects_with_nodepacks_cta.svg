<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 3354 1840" width="3354" height="1840">
  <title>Curio Projects - base + Node packs entry</title>
  <desc>3354x1840 HiDPI underlay; overlay font sizes are scaled accordingly so the
        new chrome reads alongside the underlying "Import Jupyter notebook" / "+ New
        Dataflow" buttons (which render at ~30px text in the screenshot's coordinate
        space). The Node packs CTA mirrors the secondary "Import Jupyter notebook"
        style and slots into the clear band between the page header and the empty
        state message, aligned right under "+ New Dataflow" so it reads as a
        second-row secondary action without overlapping the Search input or tab bar.</desc>
  <defs>
    <style type="text/css">
      .rubik   { font-family: Rubik, -apple-system, BlinkMacSystemFont, sans-serif; }
      .btn-lite { font-size: 28px; font-weight: 700; fill: #1E1F23; }
      .hint     { font-size: 22px; font-weight: 500; fill: #666666; }
      .micro    { font-size: 20px; font-weight: 700; fill: #FBAA69; letter-spacing: 0.06em; }
    </style>
  </defs>

  <image id="Base_Photo" width="3354" height="1840" preserveAspectRatio="xMidYMid meet"
    xlink:href="../../preview/Screenshot%202026-05-06%20at%2008.24.59.png"/>

  <!-- "Node packs" CTA: slot below the existing action row (which lives at y=210..295 real)
       and the All/Recent/Archived tab bar (y=330..380), in the clear band y=420..560
       above the "No projects yet. Create a new dataflow!" empty-state line at y=519+.
       Aligned horizontally with "+ New Dataflow" (x=2531..2839 real). -->
  <g id="Overlay_NodePacksCTA" transform="translate(2145, 440)">
    <rect width="334" height="74" rx="6" fill="#FFFFFF" stroke="#1E1F23" stroke-width="2"/>
    <text class="rubik btn-lite" x="34" y="48">Node packs</text>
    <text class="rubik micro"    x="226" y="48">NEW</text>
  </g>

  <!-- Hint below the CTA -->
  <g id="Overlay_Hint" transform="translate(2145, 540)">
    <text class="rubik hint" x="0" y="0">Browse the node warehouse</text>
  </g>

  <!-- Subtle connector tying the CTA to the existing "Import Jupyter notebook" button
       (which lives at x=2145..2479, y=210..258 real) so reviewers see this as a sibling
       secondary action rather than a stranded button. -->
  <g id="Overlay_Connector" opacity="0.35">
    <line x1="2312" y1="284" x2="2312" y2="436" stroke="#1E1F23" stroke-width="1.5" stroke-dasharray="6 8"/>
  </g>
</svg>
