<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" fill="none">
  <title>Curio - Node factory step 2 (ports)</title>
  <desc>Authoring wizard, step 2 of 5. Input/output port editor + node tile preview.</desc>
  <defs>
    <style type="text/css">
      .f { font-family: Rubik, -apple-system, BlinkMacSystemFont, sans-serif; }
      .nav { font-size: 15px; font-weight: 700; fill: #fbfcf6; }
      .nav-muted { font-size: 15px; font-weight: 700; fill: #fbfcf6; fill-opacity: 0.65; }
      .nav-accent { font-size: 15px; font-weight: 700; fill: #FBAA69; }
      .h1 { font-size: 24px; font-weight: 700; fill: #1E1F23; }
      .crumb { font-size: 12px; font-weight: 500; fill: #777777; letter-spacing: 0.04em; }
      .lbl { font-size: 11px; font-weight: 700; fill: #555555; letter-spacing: 0.04em; text-transform: uppercase; }
      .col-title { font-size: 14px; font-weight: 700; fill: #1E1F23; }
      .field { font-size: 13px; font-weight: 400; fill: #1E1F23; }
      .help { font-size: 11px; fill: #777777; }
      .chip { font-size: 11px; font-weight: 600; fill: #1E1F23; }
      .chip-on { font-size: 11px; font-weight: 600; fill: #FFFFFF; }
      .step-num { font-size: 12px; font-weight: 700; fill: #FFFFFF; }
      .step-num-dim { font-size: 12px; font-weight: 700; fill: #777777; }
      .step-num-done { font-size: 12px; font-weight: 700; fill: #FFFFFF; }
      .step-label { font-size: 12px; font-weight: 600; fill: #1E1F23; }
      .step-label-dim { font-size: 12px; font-weight: 500; fill: #999999; }
      .btn-w { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .btn-b { font-size: 13px; font-weight: 700; fill: #1E1F23; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#F5F5F5"/>

  <g id="Header_App">
    <rect width="1440" height="65" fill="#1E1F23"/>
    <line x1="0" y1="65" x2="1440" y2="65" stroke="rgba(255,255,255,0.08)"/>
    <text class="f nav" x="20" y="42">Curio</text>
    <g transform="translate(100,0)">
      <text class="f nav-muted" x="0" y="42">File</text>
      <text class="f nav-muted" x="58" y="42">View</text>
      <text class="f nav-muted" x="120" y="42">Data</text>
      <text class="f nav-muted" x="190" y="42">Provenance</text>
      <text class="f nav-muted" x="315" y="42">Help</text>
      <text class="f nav-accent" x="392" y="42">Nodes hub</text>
    </g>
    <text class="f nav-muted" x="1280" y="42" font-size="14px">Shared Guest</text>
  </g>

  <g id="Page_Header" transform="translate(0,65)">
    <rect width="1440" height="92" fill="#FAFAFA"/>
    <line x1="0" y1="92" x2="1440" y2="92" stroke="#E5E5E5"/>
    <text class="f crumb" x="24" y="32">NODES HUB / AUTHOR / UHVI HEAT LAYERS</text>
    <text class="f h1" x="24" y="64">Node factory</text>

    <g id="Stepper" transform="translate(560,30)">
      <g id="Step_1">
        <circle cx="14" cy="14" r="14" fill="#2F8F4A"/>
        <path d="M8 14 l4 4 l9 -10" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text class="f step-label" x="36" y="19">Metadata</text>
      </g>
      <line x1="148" y1="14" x2="178" y2="14" stroke="#1E1F23" stroke-width="1"/>
      <g id="Step_2" transform="translate(180,0)">
        <circle cx="14" cy="14" r="14" fill="#1E1F23"/>
        <text class="f step-num" x="14" y="18" text-anchor="middle">2</text>
        <text class="f step-label" x="36" y="19">Ports</text>
      </g>
      <line x1="280" y1="14" x2="310" y2="14" stroke="#CCCCCC" stroke-width="1"/>
      <g transform="translate(312,0)">
        <circle cx="14" cy="14" r="14" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
        <text class="f step-num-dim" x="14" y="18" text-anchor="middle">3</text>
        <text class="f step-label-dim" x="36" y="19">Template</text>
      </g>
      <line x1="430" y1="14" x2="460" y2="14" stroke="#CCCCCC"/>
      <g transform="translate(462,0)">
        <circle cx="14" cy="14" r="14" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
        <text class="f step-num-dim" x="14" y="18" text-anchor="middle">4</text>
        <text class="f step-label-dim" x="36" y="19">Dependencies</text>
      </g>
      <line x1="610" y1="14" x2="640" y2="14" stroke="#CCCCCC"/>
      <g transform="translate(642,0)">
        <circle cx="14" cy="14" r="14" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
        <text class="f step-num-dim" x="14" y="18" text-anchor="middle">5</text>
        <text class="f step-label-dim" x="36" y="19">Validate &amp; publish</text>
      </g>
    </g>
  </g>

  <g id="Body" transform="translate(0,157)">

    <g id="KindList" transform="translate(48,32)">
      <text class="f lbl" x="0" y="14">NODE KINDS IN THIS PACK</text>

      <g id="KindRow_Active" transform="translate(0,28)">
        <rect width="220" height="64" rx="6" fill="#1E1F23"/>
        <text class="f col-title" x="16" y="28" fill="#FFFFFF">UHVI Load</text>
        <text class="f help" x="16" y="46" fill="#fbfcf6" fill-opacity="0.7">data - 0 in / 2 out</text>
      </g>
      <g id="KindRow_2" transform="translate(0,100)">
        <rect width="220" height="64" rx="6" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
        <text class="f col-title" x="16" y="28">UHVI Merge</text>
        <text class="f help" x="16" y="46">computation - 1 in / 1 out</text>
      </g>
      <g id="KindRow_3" transform="translate(0,172)">
        <rect width="220" height="64" rx="6" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
        <text class="f col-title" x="16" y="28">UHVI Summary</text>
        <text class="f help" x="16" y="46">computation - 2 in / 1 out</text>
      </g>
      <g id="KindRow_Add" transform="translate(0,244)">
        <rect width="220" height="40" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-dasharray="3 3" stroke-width="1"/>
        <text class="f field" x="42" y="26" fill="#1E1F23">+ Add node kind</text>
      </g>
    </g>

    <g id="PortEditor" transform="translate(296,32)">
      <rect width="600" height="600" rx="6" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>

      <g id="KindHeader" transform="translate(24,24)">
        <text class="f col-title" x="0" y="0">UHVI Load</text>
        <text class="f help" x="0" y="20">kindId: uhvi-load   canonicalId: ai.urbanlab.uhvi/uhvi-load@2</text>
      </g>

      <line x1="24" y1="76" x2="576" y2="76" stroke="#EEEEEE"/>

      <g id="Inputs" transform="translate(24,96)">
        <text class="f lbl" x="0" y="0">INPUT PORTS</text>
        <g transform="translate(440,-12)">
          <rect width="120" height="28" rx="4" fill="#FFFFFF" stroke="#1E1F23" stroke-width="1"/>
          <text class="f btn-b" x="22" y="19" font-size="12">+ Add input</text>
        </g>
        <g transform="translate(0,18)">
          <rect width="552" height="36" rx="4" fill="#F9F9F9" stroke="#EEEEEE" stroke-width="1"/>
          <text class="f help" x="14" y="22">No input ports. UHVI Load is a source node.</text>
        </g>
      </g>

      <g id="Outputs" transform="translate(24,184)">
        <text class="f lbl" x="0" y="0">OUTPUT PORTS</text>
        <g transform="translate(440,-12)">
          <rect width="120" height="28" rx="4" fill="#1E1F23"/>
          <text class="f btn-w" x="20" y="19" font-size="12">+ Add output</text>
        </g>

        <g id="Out_Row_1" transform="translate(0,18)">
          <rect width="552" height="84" rx="4" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
          <text class="f lbl" x="14" y="22" font-size="10">LABEL</text>
          <rect x="14" y="32" width="120" height="32" rx="3" fill="#FFFFFF" stroke="#CCCCCC"/>
          <text class="f field" x="22" y="52">raster</text>

          <text class="f lbl" x="146" y="22" font-size="10">ALLOWED TYPES</text>
          <g transform="translate(146,32)">
            <rect width="86" height="24" rx="12" fill="#1E1F23"/><text class="f chip-on" x="22" y="16">RASTER</text>
            <g transform="translate(94,0)"><rect width="100" height="24" rx="12" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f chip" x="14" y="16">DATAFRAME</text></g>
            <g transform="translate(202,0)"><rect width="60" height="24" rx="12" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f chip" x="14" y="16">JSON</text></g>
          </g>

          <text class="f lbl" x="430" y="22" font-size="10">CARDINALITY</text>
          <rect x="430" y="32" width="108" height="32" rx="3" fill="#FFFFFF" stroke="#CCCCCC"/>
          <text class="f field" x="442" y="52">1</text>
          <polygon points="520,46 530,46 525,52" fill="#1E1F23"/>
        </g>

        <g id="Out_Row_2" transform="translate(0,114)">
          <rect width="552" height="84" rx="4" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
          <text class="f lbl" x="14" y="22" font-size="10">LABEL</text>
          <rect x="14" y="32" width="120" height="32" rx="3" fill="#FFFFFF" stroke="#CCCCCC"/>
          <text class="f field" x="22" y="52">svi</text>

          <text class="f lbl" x="146" y="22" font-size="10">ALLOWED TYPES</text>
          <g transform="translate(146,32)">
            <rect width="100" height="24" rx="12" fill="#1E1F23"/><text class="f chip-on" x="14" y="16">DATAFRAME</text>
            <g transform="translate(108,0)"><rect width="116" height="24" rx="12" fill="#1E1F23"/><text class="f chip-on" x="10" y="16">GEODATAFRAME</text></g>
          </g>

          <text class="f lbl" x="430" y="22" font-size="10">CARDINALITY</text>
          <rect x="430" y="32" width="108" height="32" rx="3" fill="#FFFFFF" stroke="#CCCCCC"/>
          <text class="f field" x="442" y="52">[1,n]</text>
          <polygon points="520,46 530,46 525,52" fill="#1E1F23"/>
        </g>
      </g>

      <g id="HelpBlock" transform="translate(24,470)">
        <rect width="552" height="106" rx="6" fill="#F8FAFF" stroke="#D0D8E8" stroke-width="1"/>
        <text class="f col-title" x="14" y="26" font-size="12">Type system</text>
        <text class="f help" x="14" y="48" fill="#3A4863">Pack ports must use the core SupportedType enum:</text>
        <text class="f help" x="14" y="68" fill="#3A4863">DATAFRAME, GEODATAFRAME, RASTER, VALUE, LIST, JSON.</text>
        <text class="f help" x="14" y="88" fill="#3A4863">Custom types are out of scope - propose them upstream.</text>
      </g>
    </g>

    <g id="NodePreview" transform="translate(920,32)">
      <text class="f lbl" x="0" y="14">NODE PREVIEW</text>
      <g transform="translate(0,30)">
        <rect width="460" height="240" rx="6" fill="#FFFFFF" stroke="#E5E5E5"/>
        <rect x="120" y="40" width="220" height="160" rx="8" fill="#FFFFFF" stroke="#1E1F23" stroke-width="1"/>
        <rect x="120" y="40" width="220" height="32" rx="8" fill="#1E1F23"/>
        <text class="f field" x="138" y="61" fill="#FFFFFF">UHVI Load</text>
        <text class="f help" x="138" y="100">data source</text>
        <circle cx="340" cy="120" r="6" fill="#FBAA69" stroke="#1E1F23" stroke-width="1"/>
        <text class="f help" x="350" y="124">raster</text>
        <circle cx="340" cy="160" r="6" fill="#FBAA69" stroke="#1E1F23" stroke-width="1"/>
        <text class="f help" x="350" y="164">svi</text>
        <text class="f help" x="138" y="190">play</text>
        <circle cx="160" cy="186" r="9" fill="#FBAA69"/>
      </g>

      <g transform="translate(0,294)">
        <rect width="460" height="180" rx="6" fill="#FFFFFF" stroke="#E5E5E5"/>
        <text class="f lbl" x="20" y="28">PALETTE PREVIEW (PACKS SECTION)</text>
        <rect x="20" y="40" width="420" height="60" rx="4" fill="#1E1F23"/>
        <rect x="34" y="56" width="28" height="28" rx="3" fill="rgba(251,170,105,0.25)" stroke="rgba(251,170,105,0.5)"/>
        <text class="f field" x="78" y="76" fill="#FFFFFF">UHVI Load</text>
        <text class="f help" x="78" y="92" fill="#fbfcf6" fill-opacity="0.65">ai.urbanlab.uhvi - data</text>
        <text class="f help" x="20" y="130">Drag to canvas to drop a node with the saved type</text>
        <text class="f field" x="20" y="152" font-family="ui-monospace,Menlo,monospace" font-size="11">ai.urbanlab.uhvi/uhvi-load@2</text>
      </g>
    </g>
  </g>

  <g id="Footer" transform="translate(0,836)">
    <rect width="1440" height="64" fill="#FFFFFF"/>
    <line x1="0" y1="0" x2="1440" y2="0" stroke="#E5E5E5"/>
    <text class="f help" x="24" y="38">Step 2 of 5 - Ports</text>
    <g transform="translate(944,14)">
      <rect width="100" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/>
      <text class="f btn-b" x="34" y="23">Cancel</text>
    </g>
    <g transform="translate(1064,14)">
      <rect width="100" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/>
      <text class="f btn-b" x="38" y="23">Back</text>
    </g>
    <g transform="translate(1184,14)">
      <rect width="232" height="36" rx="4" fill="#1E1F23"/>
      <text class="f btn-w" x="60" y="23">Next: Template &amp; engine</text>
    </g>
  </g>
</svg>
