<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" fill="none">
  <title>Curio - Node factory step 4 (dependencies &amp; permissions)</title>
  <desc>Authoring wizard, step 4 of 5. Pack dependencies, runtime, python/js, permissions.</desc>
  <defs>
    <style type="text/css">
      .f { font-family: Rubik, -apple-system, BlinkMacSystemFont, sans-serif; }
      .mono { font-family: ui-monospace,Menlo,Consolas,monospace; }
      .nav { font-size: 15px; font-weight: 700; fill: #fbfcf6; }
      .nav-muted { font-size: 15px; font-weight: 700; fill: #fbfcf6; fill-opacity: 0.65; }
      .nav-accent { font-size: 15px; font-weight: 700; fill: #FBAA69; }
      .h1 { font-size: 24px; font-weight: 700; fill: #1E1F23; }
      .crumb { font-size: 12px; font-weight: 500; fill: #777777; letter-spacing: 0.04em; }
      .lbl { font-size: 11px; font-weight: 700; fill: #555555; letter-spacing: 0.04em; text-transform: uppercase; }
      .h2 { font-size: 14px; font-weight: 700; fill: #1E1F23; }
      .field { font-size: 13px; fill: #1E1F23; }
      .help { font-size: 11px; fill: #777777; }
      .step-num { font-size: 12px; font-weight: 700; fill: #FFFFFF; }
      .step-num-dim { font-size: 12px; font-weight: 700; fill: #777777; }
      .step-label { font-size: 12px; font-weight: 600; fill: #1E1F23; }
      .step-label-dim { font-size: 12px; font-weight: 500; fill: #999999; }
      .btn-w { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .btn-b { font-size: 13px; font-weight: 700; fill: #1E1F23; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#F5F5F5"/>

  <g id="Header_App">
    <rect width="1440" height="65" fill="#1E1F23"/>
    <line x1="0" y1="65" x2="1440" y2="65" stroke="rgba(255,255,255,0.08)"/>
    <text class="f nav" x="20" y="42">Curio</text>
    <g transform="translate(100,0)">
      <text class="f nav-muted" x="0" y="42">File</text>
      <text class="f nav-muted" x="58" y="42">View</text>
      <text class="f nav-muted" x="120" y="42">Data</text>
      <text class="f nav-muted" x="190" y="42">Provenance</text>
      <text class="f nav-muted" x="315" y="42">Help</text>
      <text class="f nav-accent" x="392" y="42">Nodes hub</text>
    </g>
    <text class="f nav-muted" x="1280" y="42" font-size="14px">Shared Guest</text>
  </g>

  <g id="Page_Header" transform="translate(0,65)">
    <rect width="1440" height="92" fill="#FAFAFA"/>
    <line x1="0" y1="92" x2="1440" y2="92" stroke="#E5E5E5"/>
    <text class="f crumb" x="24" y="32">NODES HUB / AUTHOR / UHVI HEAT LAYERS</text>
    <text class="f h1" x="24" y="64">Node factory</text>
    <g id="Stepper" transform="translate(560,30)">
      <g><circle cx="14" cy="14" r="14" fill="#2F8F4A"/><path d="M8 14 l4 4 l9 -10" stroke="#FFFFFF" stroke-width="2" fill="none"/><text class="f step-label" x="36" y="19">Metadata</text></g>
      <line x1="148" y1="14" x2="178" y2="14" stroke="#1E1F23"/>
      <g transform="translate(180,0)"><circle cx="14" cy="14" r="14" fill="#2F8F4A"/><path d="M8 14 l4 4 l9 -10" stroke="#FFFFFF" stroke-width="2" fill="none"/><text class="f step-label" x="36" y="19">Ports</text></g>
      <line x1="280" y1="14" x2="310" y2="14" stroke="#1E1F23"/>
      <g transform="translate(312,0)"><circle cx="14" cy="14" r="14" fill="#2F8F4A"/><path d="M8 14 l4 4 l9 -10" stroke="#FFFFFF" stroke-width="2" fill="none"/><text class="f step-label" x="36" y="19">Template</text></g>
      <line x1="430" y1="14" x2="460" y2="14" stroke="#1E1F23"/>
      <g transform="translate(462,0)"><circle cx="14" cy="14" r="14" fill="#1E1F23"/><text class="f step-num" x="14" y="18" text-anchor="middle">4</text><text class="f step-label" x="36" y="19">Dependencies</text></g>
      <line x1="610" y1="14" x2="640" y2="14" stroke="#CCCCCC"/>
      <g transform="translate(642,0)"><circle cx="14" cy="14" r="14" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f step-num-dim" x="14" y="18" text-anchor="middle">5</text><text class="f step-label-dim" x="36" y="19">Validate &amp; publish</text></g>
    </g>
  </g>

  <g id="Body" transform="translate(0,157)">

    <g id="Compat" transform="translate(48,32)">
      <rect width="852" height="100" rx="6" fill="#FFFFFF" stroke="#E5E5E5"/>
      <text class="f lbl" x="20" y="28">CURIO COMPATIBILITY</text>
      <text class="f help" x="20" y="48">Semver range against the host Curio runtime. Install fails closed if unmatched.</text>
      <g transform="translate(20,60)">
        <rect width="200" height="30" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/>
        <text class="f mono" x="12" y="20" font-size="12">&gt;=1.4.0 &lt;2.0.0</text>
      </g>
      <text class="f mono" x="240" y="80" font-size="12" fill="#2F8F4A">resolves: 1.6.2 (current)</text>
    </g>

    <g id="PackDeps" transform="translate(48,144)">
      <rect width="852" height="156" rx="6" fill="#FFFFFF" stroke="#E5E5E5"/>
      <text class="f lbl" x="20" y="28">PACK DEPENDENCIES</text>
      <text class="f help" x="20" y="46">Other Curio packs required for this pack to work. No cycles. Single version per pack across the project.</text>

      <g transform="translate(20,66)">
        <rect width="812" height="36" rx="4" fill="#F9F9F9" stroke="#EEEEEE"/>
        <text class="f mono" x="14" y="22" font-size="12" fill="#1E1F23">ai.urbanlab.geo-base</text>
        <rect x="320" y="6" width="120" height="24" rx="3" fill="#FFFFFF" stroke="#CCCCCC"/>
        <text class="f mono" x="332" y="22" font-size="12">^1.2.0</text>
        <text class="f help" x="460" y="22" fill="#2F8F4A">resolves to 1.2.4</text>
        <text class="f field" x="780" y="22" fill="#999999">x</text>
      </g>
      <g transform="translate(20,108)">
        <rect width="812" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC" stroke-dasharray="3 3"/>
        <text class="f field" x="14" y="22" fill="#1E1F23">+ Add pack dependency (search the warehouse...)</text>
      </g>
    </g>

    <g id="PythonDeps" transform="translate(48,312)">
      <rect width="424" height="280" rx="6" fill="#FFFFFF" stroke="#E5E5E5"/>
      <text class="f lbl" x="20" y="28">PYTHON DEPENDENCIES</text>
      <text class="f help" x="20" y="46">PyPI packages installed into a per-pack virtualenv.</text>

      <g transform="translate(20,64)">
        <rect width="384" height="32" rx="4" fill="#F9F9F9" stroke="#EEEEEE"/>
        <text class="f mono" x="14" y="20" font-size="12">rasterio</text>
        <text class="f mono" x="200" y="20" font-size="12">^1.3</text>
        <text class="f field" x="364" y="20" fill="#999999">x</text>
      </g>
      <g transform="translate(20,104)">
        <rect width="384" height="32" rx="4" fill="#F9F9F9" stroke="#EEEEEE"/>
        <text class="f mono" x="14" y="20" font-size="12">numpy</text>
        <text class="f mono" x="200" y="20" font-size="12">&gt;=1.24,&lt;3</text>
        <text class="f field" x="364" y="20" fill="#999999">x</text>
      </g>
      <g transform="translate(20,144)">
        <rect width="384" height="32" rx="4" fill="#F9F9F9" stroke="#EEEEEE"/>
        <text class="f mono" x="14" y="20" font-size="12">shapely</text>
        <text class="f mono" x="200" y="20" font-size="12">^2.0</text>
        <text class="f field" x="364" y="20" fill="#999999">x</text>
      </g>
      <g transform="translate(20,184)">
        <rect width="384" height="32" rx="4" fill="#FFFFFF" stroke="#CCCCCC" stroke-dasharray="3 3"/>
        <text class="f field" x="14" y="20" fill="#1E1F23">+ Add pip dependency</text>
      </g>
      <text class="f help" x="20" y="244">3 deps - lockfile generated on Validate.</text>
    </g>

    <g id="JSDeps" transform="translate(488,312)">
      <rect width="412" height="280" rx="6" fill="#FFFFFF" stroke="#E5E5E5"/>
      <text class="f lbl" x="20" y="28">JS DEPENDENCIES</text>
      <text class="f help" x="20" y="46">Honored only when at least one node uses engine: javascript.</text>

      <g transform="translate(20,72)">
        <rect width="372" height="80" rx="4" fill="#F8F8F8" stroke="#EEEEEE"/>
        <text class="f field" x="14" y="32" fill="#999999">No JS deps yet.</text>
        <text class="f help" x="14" y="52">This pack is Python-only.</text>
        <text class="f help" x="14" y="68">Switch a node kind to engine: javascript to enable.</text>
      </g>
      <g transform="translate(20,168)">
        <rect width="372" height="32" rx="4" fill="#F5F5F5" stroke="#CCCCCC" stroke-dasharray="3 3"/>
        <text class="f field" x="14" y="20" fill="#999999">+ Add npm dependency (disabled)</text>
      </g>
    </g>

    <g id="Permissions" transform="translate(920,32)">
      <rect width="472" height="380" rx="6" fill="#FFFFFF" stroke="#E5E5E5"/>
      <text class="f lbl" x="20" y="28">PERMISSIONS</text>
      <text class="f help" x="20" y="46">Shown verbatim to users at install. Stay narrow.</text>

      <g transform="translate(20,68)">
        <rect width="16" height="16" rx="2" fill="#1E1F23"/>
        <path d="M3 8 L7 12 L13 4" stroke="#FFFFFF" stroke-width="1.6" fill="none"/>
        <text class="f field" x="28" y="13">Read project files (always on)</text>
      </g>
      <g transform="translate(20,100)">
        <rect width="16" height="16" rx="2" fill="#FFFFFF" stroke="#CCCCCC"/>
        <text class="f field" x="28" y="13">Write to project output cache</text>
        <text class="f help" x="28" y="30">Never the user's filesystem.</text>
      </g>
      <g transform="translate(20,148)">
        <rect width="16" height="16" rx="2" fill="#1E1F23"/>
        <path d="M3 8 L7 12 L13 4" stroke="#FFFFFF" stroke-width="1.6" fill="none"/>
        <text class="f field" x="28" y="13">Network (allowlisted hosts only)</text>
        <g transform="translate(28,22)">
          <rect width="380" height="32" rx="3" fill="#FFFFFF" stroke="#CCCCCC"/>
          <text class="f mono" x="12" y="20" font-size="12">*.urbanlab.example, tile.openstreetmap.org</text>
        </g>
      </g>
      <g transform="translate(20,212)">
        <rect width="16" height="16" rx="2" fill="#FFFFFF" stroke="#CCCCCC"/>
        <text class="f field" x="28" y="13">pythonStdlibOnly</text>
        <text class="f help" x="28" y="30">Off because deps are declared above.</text>
      </g>

      <line x1="20" y1="262" x2="452" y2="262" stroke="#EEEEEE"/>
      <text class="f help" x="20" y="284" fill="#1E1F23">registerNodeKinds: 3 (auto-derived from step 2).</text>
      <text class="f help" x="20" y="304">Subprocess access is reserved and will be rejected by the v1 installer.</text>
    </g>

    <g id="ManifestPreview" transform="translate(920,432)">
      <rect width="472" height="160" rx="6" fill="#1E1F23"/>
      <text class="f lbl" x="20" y="28" fill="#9A9A9E">MANIFEST PREVIEW (DEPENDENCIES)</text>
      <text class="f mono" x="20" y="50" font-size="11" fill="#fbfcf6">"dependencies": {</text>
      <text class="f mono" x="32" y="68" font-size="11" fill="#fbfcf6">"packs":   { "ai.urbanlab.geo-base": "^1.2.0" },</text>
      <text class="f mono" x="32" y="86" font-size="11" fill="#fbfcf6">"python":  { "rasterio": "^1.3", "numpy": "&gt;=1.24,&lt;3", "shapely": "^2.0" },</text>
      <text class="f mono" x="32" y="104" font-size="11" fill="#fbfcf6">"js":      {},</text>
      <text class="f mono" x="32" y="122" font-size="11" fill="#fbfcf6">"system":  []</text>
      <text class="f mono" x="20" y="140" font-size="11" fill="#fbfcf6">}</text>
    </g>

  </g>

  <g id="Footer" transform="translate(0,836)">
    <rect width="1440" height="64" fill="#FFFFFF"/>
    <line x1="0" y1="0" x2="1440" y2="0" stroke="#E5E5E5"/>
    <text class="f help" x="24" y="38">Step 4 of 5 - Dependencies &amp; permissions</text>
    <g transform="translate(944,14)"><rect width="100" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f btn-b" x="34" y="23">Cancel</text></g>
    <g transform="translate(1064,14)"><rect width="100" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f btn-b" x="38" y="23">Back</text></g>
    <g transform="translate(1184,14)"><rect width="232" height="36" rx="4" fill="#1E1F23"/><text class="f btn-w" x="38" y="23">Next: Validate &amp; publish</text></g>
  </g>
</svg>
