<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" fill="none">
  <title>Curio - Node factory step 3 (template &amp; engine)</title>
  <desc>Authoring wizard, step 3 of 5. Editor mode + engine + code template.</desc>
  <defs>
    <style type="text/css">
      .f { font-family: Rubik, -apple-system, BlinkMacSystemFont, sans-serif; }
      .mono { font-family: ui-monospace,Menlo,Consolas,monospace; }
      .nav { font-size: 15px; font-weight: 700; fill: #fbfcf6; }
      .nav-muted { font-size: 15px; font-weight: 700; fill: #fbfcf6; fill-opacity: 0.65; }
      .nav-accent { font-size: 15px; font-weight: 700; fill: #FBAA69; }
      .h1 { font-size: 24px; font-weight: 700; fill: #1E1F23; }
      .crumb { font-size: 12px; font-weight: 500; fill: #777777; letter-spacing: 0.04em; }
      .lbl { font-size: 11px; font-weight: 700; fill: #555555; letter-spacing: 0.04em; text-transform: uppercase; }
      .field { font-size: 13px; fill: #1E1F23; }
      .help { font-size: 11px; fill: #777777; }
      .step-num { font-size: 12px; font-weight: 700; fill: #FFFFFF; }
      .step-num-dim { font-size: 12px; font-weight: 700; fill: #777777; }
      .step-label { font-size: 12px; font-weight: 600; fill: #1E1F23; }
      .step-label-dim { font-size: 12px; font-weight: 500; fill: #999999; }
      .btn-w { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .btn-b { font-size: 13px; font-weight: 700; fill: #1E1F23; }
      .code-keyword { font-size: 12px; fill: #C586C0; }
      .code-fn { font-size: 12px; fill: #DCDCAA; }
      .code-str { font-size: 12px; fill: #CE9178; }
      .code-comment { font-size: 12px; fill: #6A9955; }
      .code-text { font-size: 12px; fill: #D4D4D4; }
      .code-num { font-size: 12px; fill: #B5CEA8; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#F5F5F5"/>

  <g id="Header_App">
    <rect width="1440" height="65" fill="#1E1F23"/>
    <line x1="0" y1="65" x2="1440" y2="65" stroke="rgba(255,255,255,0.08)"/>
    <text class="f nav" x="20" y="42">Curio</text>
    <g transform="translate(100,0)">
      <text class="f nav-muted" x="0" y="42">File</text>
      <text class="f nav-muted" x="58" y="42">View</text>
      <text class="f nav-muted" x="120" y="42">Data</text>
      <text class="f nav-muted" x="190" y="42">Provenance</text>
      <text class="f nav-muted" x="315" y="42">Help</text>
      <text class="f nav-accent" x="392" y="42">Nodes hub</text>
    </g>
    <text class="f nav-muted" x="1280" y="42" font-size="14px">Shared Guest</text>
  </g>

  <g id="Page_Header" transform="translate(0,65)">
    <rect width="1440" height="92" fill="#FAFAFA"/>
    <line x1="0" y1="92" x2="1440" y2="92" stroke="#E5E5E5"/>
    <text class="f crumb" x="24" y="32">NODES HUB / AUTHOR / UHVI HEAT LAYERS / UHVI LOAD</text>
    <text class="f h1" x="24" y="64">Node factory</text>
    <g id="Stepper" transform="translate(560,30)">
      <g><circle cx="14" cy="14" r="14" fill="#2F8F4A"/><path d="M8 14 l4 4 l9 -10" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text class="f step-label" x="36" y="19">Metadata</text></g>
      <line x1="148" y1="14" x2="178" y2="14" stroke="#1E1F23"/>
      <g transform="translate(180,0)"><circle cx="14" cy="14" r="14" fill="#2F8F4A"/><path d="M8 14 l4 4 l9 -10" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text class="f step-label" x="36" y="19">Ports</text></g>
      <line x1="280" y1="14" x2="310" y2="14" stroke="#1E1F23"/>
      <g transform="translate(312,0)"><circle cx="14" cy="14" r="14" fill="#1E1F23"/><text class="f step-num" x="14" y="18" text-anchor="middle">3</text><text class="f step-label" x="36" y="19">Template</text></g>
      <line x1="430" y1="14" x2="460" y2="14" stroke="#CCCCCC"/>
      <g transform="translate(462,0)"><circle cx="14" cy="14" r="14" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f step-num-dim" x="14" y="18" text-anchor="middle">4</text><text class="f step-label-dim" x="36" y="19">Dependencies</text></g>
      <line x1="610" y1="14" x2="640" y2="14" stroke="#CCCCCC"/>
      <g transform="translate(642,0)"><circle cx="14" cy="14" r="14" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f step-num-dim" x="14" y="18" text-anchor="middle">5</text><text class="f step-label-dim" x="36" y="19">Validate &amp; publish</text></g>
    </g>
  </g>

  <g id="Body" transform="translate(0,157)">
    <g id="Settings" transform="translate(48,32)">
      <rect width="380" height="600" rx="6" fill="#FFFFFF" stroke="#E5E5E5"/>

      <text class="f lbl" x="24" y="44">EDITOR MODE</text>
      <g transform="translate(24,56)">
        <g><rect width="80" height="36" rx="4" fill="#1E1F23"/><text class="f btn-w" x="22" y="23">code</text></g>
        <g transform="translate(88,0)"><rect width="92" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f btn-b" x="20" y="23">grammar</text></g>
        <g transform="translate(188,0)"><rect width="84" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f btn-b" x="22" y="23">widgets</text></g>
        <g transform="translate(280,0)"><rect width="60" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f btn-b" x="18" y="23">none</text></g>
      </g>

      <text class="f lbl" x="24" y="124">ENGINE</text>
      <g transform="translate(24,136)">
        <g>
          <rect width="160" height="36" rx="4" fill="#1E1F23"/>
          <text class="f btn-w" x="20" y="23">Python (sandbox)</text>
        </g>
        <g transform="translate(168,0)">
          <rect width="160" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/>
          <text class="f btn-b" x="22" y="23">JavaScript (subproc)</text>
        </g>
      </g>
      <text class="f help" x="24" y="194">Python: stdlib + declared deps. JS: per-request node subprocess.</text>

      <text class="f lbl" x="24" y="234">FEATURE FLAGS</text>
      <g transform="translate(24,250)">
        <g><rect width="16" height="16" rx="2" fill="#1E1F23"/><path d="M3 8 L7 12 L13 4" stroke="#FFFFFF" stroke-width="1.6" fill="none"/><text class="f field" x="24" y="13">hasCode</text></g>
        <g transform="translate(0,28)"><rect width="16" height="16" rx="2" fill="#1E1F23"/><path d="M3 8 L7 12 L13 4" stroke="#FFFFFF" stroke-width="1.6" fill="none"/><text class="f field" x="24" y="13">hasWidgets (required for widget markers)</text></g>
        <g transform="translate(0,56)"><rect width="16" height="16" rx="2" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f field" x="24" y="13">hasGrammar</text></g>
        <g transform="translate(0,84)"><rect width="16" height="16" rx="2" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f field" x="24" y="13">showTemplateModal</text></g>
      </g>

      <text class="f lbl" x="24" y="384">TEMPLATE FILE</text>
      <g transform="translate(24,396)">
        <rect width="332" height="40" rx="4" fill="#F5F5F5" stroke="#CCCCCC"/>
        <text class="f mono" x="14" y="26" font-size="12">templates/uhvi-load/index.py</text>
        <text class="f help" x="0" y="60">Auto-saved on Next. POSIX path inside the pack.</text>
      </g>

      <text class="f lbl" x="24" y="492">WIDGET MARKERS</text>
      <g transform="translate(24,504)">
        <rect width="332" height="64" rx="4" fill="#FFF8EE" stroke="#FBAA69"/>
        <text class="f field" x="14" y="24" fill="#7A4A12" font-size="12">Use {{widget:name=type}} markers in code</text>
        <text class="f help" x="14" y="44" fill="#7A4A12">e.g. {{checkbox:downsample=bool}} {{select:city=str}}</text>
      </g>
    </g>

    <g id="CodeEditor" transform="translate(444,32)">
      <rect width="640" height="600" rx="6" fill="#1E1F23" stroke="#000000" stroke-opacity="0.3"/>

      <g id="Tabs" transform="translate(0,0)">
        <rect width="640" height="36" fill="#2B2C31"/>
        <rect x="0" y="0" width="180" height="36" fill="#1E1F23"/>
        <text class="f mono" x="20" y="23" fill="#FFFFFF" font-size="12">templates/uhvi-load/index.py</text>
        <line x1="180" y1="36" x2="180" y2="0" stroke="rgba(0,0,0,0.4)"/>
      </g>

      <g id="Gutter" transform="translate(0,52)" fill="#5A5C63">
        <text class="f mono" x="14" y="14" font-size="11">1</text>
        <text class="f mono" x="14" y="32" font-size="11">2</text>
        <text class="f mono" x="14" y="50" font-size="11">3</text>
        <text class="f mono" x="14" y="68" font-size="11">4</text>
        <text class="f mono" x="14" y="86" font-size="11">5</text>
        <text class="f mono" x="14" y="104" font-size="11">6</text>
        <text class="f mono" x="14" y="122" font-size="11">7</text>
        <text class="f mono" x="14" y="140" font-size="11">8</text>
        <text class="f mono" x="14" y="158" font-size="11">9</text>
        <text class="f mono" x="10" y="176" font-size="11">10</text>
        <text class="f mono" x="10" y="194" font-size="11">11</text>
        <text class="f mono" x="10" y="212" font-size="11">12</text>
      </g>

      <g id="Code" transform="translate(48,52)">
        <text class="f mono code-keyword" x="0" y="14">import</text>
        <text class="f mono code-text" x="56" y="14">rasterio</text>
        <text class="f mono code-keyword" x="0" y="32">import</text>
        <text class="f mono code-text" x="56" y="32">pandas</text>
        <text class="f mono code-keyword" x="120" y="32">as</text>
        <text class="f mono code-text" x="146" y="32">pd</text>

        <text class="f mono code-comment" x="0" y="68"># Widget markers exposed in the node's widget panel</text>
        <text class="f mono code-keyword" x="0" y="86">city =</text>
        <text class="f mono code-str" x="60" y="86">"{{select:city=str}}"</text>
        <text class="f mono code-keyword" x="0" y="104">downsample =</text>
        <text class="f mono code-text" x="100" y="104">{{checkbox:downsample=bool}}</text>

        <text class="f mono code-keyword" x="0" y="140">def</text>
        <text class="f mono code-fn" x="32" y="140">run</text>
        <text class="f mono code-text" x="62" y="140">():</text>
        <text class="f mono code-text" x="20" y="158">raster = rasterio.open(_resolve(city))</text>
        <text class="f mono code-keyword" x="20" y="176">if</text>
        <text class="f mono code-text" x="40" y="176">downsample: raster = raster.read(out_shape=(1, 256, 256))</text>
        <text class="f mono code-text" x="20" y="194">svi = pd.read_csv(_resolve_svi(city))</text>
        <text class="f mono code-keyword" x="20" y="212">return</text>
        <text class="f mono code-text" x="68" y="212">{"raster": raster, "svi": svi}</text>
      </g>

      <g id="Toolbar" transform="translate(0,556)">
        <rect width="640" height="44" fill="#2B2C31"/>
        <g transform="translate(14,8)">
          <rect width="84" height="28" rx="4" fill="#FBAA69"/>
          <polygon points="20,9 20,19 30,14" fill="#1E1F23"/>
          <text class="f btn-b" x="38" y="19" font-size="12">Dry-run</text>
        </g>
        <text class="f mono" x="116" y="28" fill="#fbfcf6" font-opacity="0.7" font-size="11" fill-opacity="0.7">python 3.11.6 - sandbox</text>
        <text class="f mono" x="540" y="28" fill="#fbfcf6" fill-opacity="0.6" font-size="11">UTF-8 - LF</text>
      </g>
    </g>

    <g id="WidgetsPanel" transform="translate(1100,32)">
      <rect width="316" height="600" rx="6" fill="#FFFFFF" stroke="#E5E5E5"/>
      <text class="f lbl" x="20" y="32">DETECTED WIDGETS</text>

      <g transform="translate(20,52)">
        <rect width="276" height="68" rx="4" fill="#F9F9F9" stroke="#E5E5E5"/>
        <text class="f field" x="14" y="22" font-weight="600">city</text>
        <text class="f help" x="14" y="40">SELECTION (str)</text>
        <text class="f help" x="14" y="58">marker: {{select:city=str}}</text>
      </g>
      <g transform="translate(20,134)">
        <rect width="276" height="68" rx="4" fill="#F9F9F9" stroke="#E5E5E5"/>
        <text class="f field" x="14" y="22" font-weight="600">downsample</text>
        <text class="f help" x="14" y="40">CHECKBOX (bool)</text>
        <text class="f help" x="14" y="58">marker: {{checkbox:downsample=bool}}</text>
      </g>

      <text class="f lbl" x="20" y="240">DRY-RUN OUTPUT</text>
      <g transform="translate(20,256)">
        <rect width="276" height="80" rx="4" fill="#1E1F23"/>
        <text class="f mono" x="14" y="22" fill="#FFFFFF" font-size="11">[ok] sample run completed</text>
        <text class="f mono" x="14" y="40" fill="#FFFFFF" font-size="11">[ok] returned dict with keys:</text>
        <text class="f mono" x="14" y="58" fill="#FBAA69" font-size="11">  raster, svi</text>
      </g>

      <text class="f lbl" x="20" y="370">DESCRIPTOR PREVIEW</text>
      <g transform="translate(20,386)">
        <rect width="276" height="194" rx="4" fill="#F5F5F5" stroke="#E5E5E5"/>
        <text class="f mono" x="14" y="22" font-size="11">id: ai.urbanlab.uhvi/uhvi-load</text>
        <text class="f mono" x="14" y="40" font-size="11">editor: code</text>
        <text class="f mono" x="14" y="58" font-size="11">engine: python</text>
        <text class="f mono" x="14" y="76" font-size="11">hasCode: true</text>
        <text class="f mono" x="14" y="94" font-size="11">hasWidgets: true</text>
        <text class="f mono" x="14" y="112" font-size="11">hasGrammar: false</text>
        <text class="f mono" x="14" y="138" font-size="11">inputPorts:  []</text>
        <text class="f mono" x="14" y="156" font-size="11">outputPorts: 2 (raster, svi)</text>
        <text class="f mono" x="14" y="180" font-size="11">templateRef: templates/uhvi-load/index.py</text>
      </g>
    </g>
  </g>

  <g id="Footer" transform="translate(0,836)">
    <rect width="1440" height="64" fill="#FFFFFF"/>
    <line x1="0" y1="0" x2="1440" y2="0" stroke="#E5E5E5"/>
    <text class="f help" x="24" y="38">Step 3 of 5 - Template &amp; engine</text>
    <g transform="translate(944,14)"><rect width="100" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f btn-b" x="34" y="23">Cancel</text></g>
    <g transform="translate(1064,14)"><rect width="100" height="36" rx="4" fill="#FFFFFF" stroke="#CCCCCC"/><text class="f btn-b" x="38" y="23">Back</text></g>
    <g transform="translate(1184,14)"><rect width="232" height="36" rx="4" fill="#1E1F23"/><text class="f btn-w" x="50" y="23">Next: Dependencies</text></g>
  </g>
</svg>
