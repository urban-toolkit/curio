<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" fill="none">
  <title>Curio - Installed Dataset Palette</title>
  <desc>Figma-ready: installed and current-dataflow datasets palette. No packs; drag a dataset into a Data Loader node to autocomplete path and loader code.</desc>
  <defs>
    <style type="text/css">
      .f { font-family: Rubik, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif; }
      .nav { font-size: 15px; font-weight: 500; fill: #FFFFFF; }
      .nav-dim { font-size: 15px; font-weight: 500; fill: rgba(255,255,255,0.65); }
      .nav-accent { font-size: 15px; font-weight: 700; fill: #FBAA69; }
      .flow { font-size: 16px; font-weight: 600; fill: #1E1F23; }
      .section { font-size: 10px; font-weight: 700; fill: #9A9A9E; letter-spacing: 0.08em; }
      .drawer-title { font-size: 11px; font-weight: 700; fill: #FFFFFF; letter-spacing: 0.1em; }
      .card-title { font-size: 14px; font-weight: 600; fill: #FFFFFF; }
      .meta { font-size: 12px; font-weight: 400; fill: #9A9A9E; }
      .chip { font-size: 11px; font-weight: 600; fill: #1E1F23; }
      .anno { font-size: 11px; font-weight: 500; fill: #434548; }
      .badge-data { font-size: 9px; font-weight: 700; fill: #FFFFFF; letter-spacing: 0.06em; }
      .code { font-family: 'Fira Code', 'Courier New', monospace; font-size: 12px; fill: #434548; }
      .code-dim { font-family: 'Fira Code', 'Courier New', monospace; font-size: 12px; fill: #9A9A9E; }
    </style>
    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#B8B8BC" opacity="0.5"/>
    </pattern>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="floatShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g id="Frame">
    <rect id="Frame_BG" width="1440" height="900" fill="#E8E8EA"/>
    <rect y="65" width="1440" height="835" fill="url(#dotGrid)"/>

    <g id="Header_App">
      <rect width="1440" height="65" fill="#1E1F23"/>
      <text class="f nav" x="24" y="42">Curio</text>
      <g id="Header_Menus" transform="translate(100,0)">
        <text class="f nav-dim" x="0" y="42">File</text>
        <text class="f nav-dim" x="56" y="42">View</text>
        <text class="f nav-accent" x="112" y="42">Data</text>
        <text class="f nav-dim" x="168" y="42">Provenance</text>
        <text class="f nav-dim" x="280" y="42">Help</text>
      </g>
      <g id="Header_User" transform="translate(1280,0)">
        <circle cx="126" cy="32" r="16" fill="#434548"/>
        <text class="f nav" text-anchor="middle" x="126" y="37" font-size="11" font-weight="600">SG</text>
      </g>
    </g>

    <text class="f flow" x="108" y="100">DefaultDataflow</text>

    <!-- Left palette: DATA tab active -->
    <g id="Palette_Rail" transform="translate(20,108)">
      <rect width="76" height="640" rx="14" fill="#1E1F23" filter="url(#panelShadow)"/>
      <text class="f section" x="38" y="32" text-anchor="middle" fill="#FBAA69">DATA</text>
      <line x1="14" y1="44" x2="62" y2="44" stroke="#FBAA69" stroke-width="2"/>
      <g id="Palette_DataIcons" transform="translate(14,56)">
        <rect width="24" height="24" rx="5" fill="#FBAA69" opacity="0.25" stroke="#FBAA69" stroke-width="1"/>
        <text class="f" x="12" y="17" text-anchor="middle" font-size="10" fill="#FBAA69">CSV</text>
        <g transform="translate(32,0)"><rect width="24" height="24" rx="5" fill="#FFFFFF" opacity="0.1"/></g>
        <g transform="translate(0,32)"><rect width="24" height="24" rx="5" fill="#FFFFFF" opacity="0.1"/></g>
        <g transform="translate(32,32)"><rect width="24" height="24" rx="5" fill="#4CAF50" opacity="0.35"/><text class="f" x="12" y="17" text-anchor="middle" font-size="9" fill="#FFFFFF">GEO</text></g>
        <g transform="translate(0,64)"><rect width="24" height="24" rx="5" fill="#FFFFFF" opacity="0.1"/></g>
        <g transform="translate(32,64)"><rect width="24" height="24" rx="5" fill="#7E57C2" opacity="0.35"/><text class="f" x="12" y="17" text-anchor="middle" font-size="8" fill="#FFFFFF">JSON</text></g>
      </g>
      <text class="f section" x="38" y="200" text-anchor="middle">LOCAL</text>
      <g transform="translate(14,210)">
        <rect width="24" height="24" rx="5" fill="#FFFFFF" opacity="0.08"/>
        <rect x="32" width="24" height="24" rx="5" fill="#FFFFFF" opacity="0.08"/>
        <rect y="32" width="24" height="24" rx="5" fill="#FFFFFF" opacity="0.08"/>
        <rect x="32" y="32" width="24" height="24" rx="5" fill="#FFFFFF" opacity="0.08"/>
      </g>
      <text class="f section" x="38" y="310" text-anchor="middle">RECENT</text>
      <g id="Btn_GetData" transform="translate(12,560)">
        <rect width="52" height="52" rx="10" fill="#FBAA69"/>
        <line x1="26" y1="16" x2="26" y2="36" stroke="#1E1F23" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="16" y1="26" x2="36" y2="26" stroke="#1E1F23" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <text class="f section" x="38" y="628" text-anchor="middle" fill="#FBAA69">DATASETS</text>
    </g>

    <!-- Floating installed dataset palette -->
    <g id="InstalledDatasets_Palette" transform="translate(108,128)" filter="url(#floatShadow)">
      <rect width="336" height="520" rx="10" fill="#2A2B2F"/>
      <text class="f drawer-title" x="16" y="28">DATASET PALETTE</text>
      <rect x="236" y="12" width="84" height="24" rx="12" fill="#1E1F23"/>
      <text class="f badge-data" x="278" y="27" text-anchor="middle">5 READY</text>

      <g id="PaletteSearch" transform="translate(16,48)">
        <rect width="304" height="36" rx="8" fill="#1E1F23" stroke="#434548" stroke-width="1"/>
        <circle cx="18" cy="18" r="6" stroke="#9A9A9E" stroke-width="1.3" fill="none"/>
        <line x1="22" y1="22" x2="27" y2="27" stroke="#9A9A9E" stroke-width="1.3"/>
        <text class="f meta" x="38" y="23">Search name, source, format</text>
      </g>

      <g id="PaletteTabs" transform="translate(16,100)">
        <rect width="96" height="28" rx="14" fill="#FBAA69"/>
        <text class="f chip" x="48" y="18" text-anchor="middle" font-weight="700">Installed</text>
        <text class="f chip" x="154" y="18" text-anchor="middle" fill="#9A9A9E">Computed</text>
        <text class="f chip" x="246" y="18" text-anchor="middle" fill="#9A9A9E">Recent</text>
      </g>

      <text class="f section" x="16" y="154" fill="#FFFFFF">INSTALLED</text>
      <g id="Dataset_MilanMRT" transform="translate(16,166)">
        <rect width="304" height="72" rx="8" fill="#1E1F23" stroke="#FBAA69" stroke-width="1.5"/>
        <circle cx="14" cy="22" r="2" fill="#747474"/>
        <circle cx="14" cy="34" r="2" fill="#747474"/>
        <circle cx="14" cy="46" r="2" fill="#747474"/>
        <rect x="28" y="14" width="34" height="18" rx="5" fill="#DFF2E1"/>
        <text class="f badge-data" x="45" y="26" text-anchor="middle" fill="#2F8F4A">TIF</text>
        <text class="f card-title" x="72" y="28">Milan MRT raster</text>
        <text class="f meta" x="72" y="46">GeoTIFF - 1200 x 1200 - Urban Lab</text>
        <text class="code-dim" x="72" y="62" font-size="10px">datasets/milan_mrt_raster.tif</text>
        <rect x="254" y="14" width="38" height="18" rx="5" fill="#43A047"/>
        <text class="f badge-data" x="273" y="26" text-anchor="middle">LIVE</text>
      </g>

      <g id="Dataset_Demographics" transform="translate(16,246)">
        <rect width="304" height="64" rx="8" fill="#1E1F23"/>
        <rect x="28" y="13" width="38" height="18" rx="5" fill="#EADCFB"/>
        <text class="f badge-data" x="47" y="25" text-anchor="middle" fill="#7E57C2">SHP</text>
        <text class="f card-title" x="76" y="27">Socio demographics</text>
        <text class="f meta" x="76" y="45">Shapefile - 98 tracts - Census ACS</text>
        <text class="code-dim" x="76" y="58" font-size="10px">datasets/socio_demographics.shp</text>
      </g>

      <text class="f section" x="16" y="338" fill="#FFFFFF">COMPUTED IN THIS DATAFLOW</text>
      <g id="Dataset_Filtered" transform="translate(16,350)">
        <rect width="304" height="58" rx="8" fill="#1E1F23"/>
        <rect x="28" y="12" width="34" height="18" rx="5" fill="#DFF2E1"/>
        <text class="f badge-data" x="45" y="24" text-anchor="middle" fill="#2F8F4A">GEO</text>
        <text class="f card-title" x="76" y="25">filtered_buildings.geojson</text>
        <text class="f meta" x="76" y="43">Spatial Filter - just now - 8,214 features</text>
      </g>

      <g id="Dataset_Weather" transform="translate(16,416)">
        <rect width="304" height="58" rx="8" fill="#1E1F23"/>
        <rect x="28" y="12" width="34" height="18" rx="5" fill="#E3F2FD"/>
        <text class="f badge-data" x="45" y="24" text-anchor="middle" fill="#1565C0">CSV</text>
        <text class="f card-title" x="76" y="25">UMEP weather timeseries</text>
        <text class="f meta" x="76" y="43">Weather Loader - 8,760 rows</text>
      </g>

      <g id="PaletteFooter" transform="translate(16,488)">
        <rect width="144" height="24" rx="6" fill="none" stroke="#5C9FD6" stroke-width="1.3"/>
        <text class="f chip" x="72" y="16" text-anchor="middle" fill="#5C9FD6">Browse Data Catalog</text>
        <text class="f meta" x="164" y="16" fill="#747474">Drag into a loader</text>
      </g>
    </g>

    <!-- Canvas: dragging a dataset into a Data Loader node -->
    <g id="DataLoader_Node" transform="translate(500,210)" filter="url(#floatShadow)">
      <rect width="452" height="360" rx="10" fill="#FFFFFF" stroke="#FBAA69" stroke-width="2" stroke-dasharray="6 4"/>
      <rect width="452" height="42" rx="10" fill="#1E1F23"/>
      <rect y="32" width="452" height="10" fill="#1E1F23"/>
      <text class="f card-title" x="16" y="27" fill="#FFFFFF">GeoTIFF Data Loader</text>
      <rect x="302" y="12" width="54" height="18" rx="5" fill="#FBAA69"/>
      <text class="f badge-data" x="329" y="24" text-anchor="middle" fill="#1E1F23">LOADER</text>
      <rect x="364" y="12" width="72" height="18" rx="5" fill="#43A047"/>
      <text class="f badge-data" x="400" y="24" text-anchor="middle">READY</text>

      <g id="DropHint" transform="translate(16,58)">
        <rect width="420" height="54" rx="8" fill="#FDF0E8" stroke="#FBAA69" stroke-width="1.5"/>
        <circle cx="24" cy="27" r="12" fill="#FBAA69"/>
        <line x1="24" y1="18" x2="24" y2="36" stroke="#1E1F23" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="27" x2="33" y2="27" stroke="#1E1F23" stroke-width="2" stroke-linecap="round"/>
        <text class="f chip" x="50" y="24" font-size="13px" font-weight="700">Drop dataset here</text>
        <text class="f meta" x="50" y="40" fill="#747474">Path, loader, schema preview, and ports fill in together</text>
      </g>

      <g id="CodeEditor" transform="translate(16,128)">
        <rect width="420" height="156" rx="8" fill="#F5F5F6" stroke="#D0D0D4"/>
        <rect width="420" height="28" rx="8" fill="#ECECEE"/>
        <text class="f meta" x="14" y="19" fill="#747474">loader.py</text>
        <text class="code-dim" x="14" y="52">1  # Autocomplete inserted from dataset palette</text>
        <text class="code" x="14" y="78">2  dataset = curio.datasets.get("milan_mrt_raster")</text>
        <text class="code" x="14" y="104">3  raster = load_geotiff(dataset.path)</text>
        <text class="code" x="14" y="130">4  output.set_schema(raster.schema)</text>
      </g>

      <g id="LoaderFooter" transform="translate(16,304)">
        <rect width="166" height="28" rx="14" fill="#E8F5E9"/>
        <text class="f chip" x="83" y="18" text-anchor="middle" fill="#2E7D32">Path linked</text>
        <rect x="194" width="142" height="28" rx="14" fill="#E3F2FD"/>
        <text class="f chip" x="265" y="18" text-anchor="middle" fill="#1565C0">GEO port created</text>
        <circle cx="430" cy="14" r="6" fill="#2F8F4A"/>
      </g>
    </g>

    <g id="DraggedDatasetGhost" transform="translate(392,164)" opacity="0.92" filter="url(#floatShadow)">
      <rect width="220" height="64" rx="8" fill="#1E1F23" stroke="#FBAA69" stroke-width="1.5"/>
      <rect x="14" y="14" width="34" height="18" rx="5" fill="#DFF2E1"/>
      <text class="f badge-data" x="31" y="26" text-anchor="middle" fill="#2F8F4A">TIF</text>
      <text class="f card-title" x="58" y="28">Milan MRT raster</text>
      <text class="f meta" x="58" y="46">Drag preview</text>
    </g>
    <path d="M 450 226 C 512 238 526 256 540 272" stroke="#FBAA69" stroke-width="2" stroke-dasharray="5 5" fill="none"/>

    <!-- Right: loader assist panel -->
    <g id="LoaderAssist_Drawer" transform="translate(1040,65)" filter="url(#panelShadow)">
      <rect width="400" height="835" fill="#FFFFFF"/>
      <line x1="0" y1="0" x2="0" y2="835" stroke="#D0D0D4" stroke-width="1"/>
      <g id="Drawer_Header">
        <text class="f flow" x="20" y="44" font-size="20px">Loader Assist</text>
        <rect x="340" y="20" width="28" height="28" rx="6" fill="#EFEFEF"/>
        <text class="f meta" x="348" y="40" font-size="14px">x</text>
      </g>

      <g id="SelectedDataset" transform="translate(20,72)">
        <text class="f section" x="0" y="14" fill="#747474">SELECTED DATASET</text>
        <rect y="28" width="360" height="104" rx="10" fill="#FAFAFA" stroke="#E0E0E4" stroke-width="1"/>
        <rect x="14" y="44" width="48" height="48" rx="8" fill="#4CAF50" opacity="0.2"/>
        <text class="f chip" x="38" y="75" font-size="16px" font-weight="700" fill="#2F8F4A">MR</text>
        <text class="f" x="76" y="58" font-size="14px" font-weight="600" fill="#1E1F23">Milan MRT raster</text>
        <text class="f meta" x="76" y="78">GeoTIFF - Urban Lab - MIT</text>
        <rect x="76" y="90" width="58" height="20" rx="4" fill="#E8F5E9"/>
        <text class="f chip" x="105" y="104" text-anchor="middle" fill="#2E7D32" font-size="10px">GeoTIFF</text>
        <rect x="144" y="90" width="70" height="20" rx="4" fill="#FFF3E0"/>
        <text class="f chip" x="179" y="104" text-anchor="middle" fill="#E65100" font-size="10px">raster</text>
      </g>

      <g id="GeneratedPath" transform="translate(20,232)">
        <text class="f section" x="0" y="14" fill="#747474">PATH AUTOCOMPLETE</text>
        <rect y="28" width="360" height="44" rx="8" fill="#F5F5F6" stroke="#D0D0D4"/>
        <text class="code" x="14" y="55">curio://datasets/milan_mrt_raster</text>
      </g>

      <g id="GeneratedLoader" transform="translate(20,332)">
        <text class="f section" x="0" y="14" fill="#747474">REQUIRED LOADER CODE</text>
        <rect y="28" width="360" height="146" rx="8" fill="#1E1F23"/>
        <text class="code-dim" x="14" y="58" fill="#9A9A9E">from curio.loaders import load_geotiff</text>
        <text class="code-dim" x="14" y="84" fill="#9A9A9E">dataset = curio.datasets.get(</text>
        <text class="code-dim" x="34" y="110" fill="#9A9A9E">"milan_mrt_raster"</text>
        <text class="code-dim" x="14" y="136" fill="#9A9A9E">)</text>
        <text class="code-dim" x="14" y="162" fill="#9A9A9E">raster = load_geotiff(dataset.path)</text>
      </g>

      <g id="LoaderOutputs" transform="translate(20,540)">
        <text class="f section" x="0" y="14" fill="#747474">OUTPUTS</text>
        <rect y="28" width="360" height="44" rx="8" fill="#F8FDF9" stroke="#DFF2E1"/>
        <circle cx="22" cy="50" r="6" fill="#2F8F4A"/>
        <text class="f chip" x="42" y="54" fill="#2F8F4A">GEO raster port</text>
        <text class="f meta" x="262" y="54" fill="#747474">1200 x 1200</text>
        <rect y="84" width="360" height="44" rx="8" fill="#F8F8F8" stroke="#EBEBEB"/>
        <circle cx="22" cy="106" r="6" fill="#6B6B76"/>
        <text class="f chip" x="42" y="110" fill="#434548">Schema preview</text>
        <text class="f meta" x="274" y="110" fill="#747474">12 fields</text>
      </g>

      <g id="AssistActions" transform="translate(20,760)">
        <rect width="172" height="44" rx="8" fill="#1E1F23"/>
        <text class="f nav" x="86" y="28" text-anchor="middle" font-size="13px">Insert loader</text>
        <rect x="204" width="156" height="44" rx="8" fill="#FFFFFF" stroke="#D0D0D4"/>
        <text class="f chip" x="282" y="28" text-anchor="middle">Open dataset</text>
      </g>
    </g>

    <!-- Annotations -->
    <g id="Annotations" opacity="0.95">
      <g transform="translate(458,118)">
        <rect width="236" height="48" rx="8" fill="#FFFFFF" stroke="#FBAA69" stroke-width="1.5"/>
        <text class="f anno" x="12" y="20">1. Menu palette, no pack layer</text>
        <text class="f anno" x="12" y="38">Installed and computed datasets together</text>
      </g>
      <g transform="translate(420,560)">
        <rect width="300" height="48" rx="8" fill="#FFFFFF" stroke="#FBAA69" stroke-width="1.5"/>
        <text class="f anno" x="12" y="20">2. Drop on Data Loader code</text>
        <text class="f anno" x="12" y="38">Path and loader code autocomplete in place</text>
      </g>
    </g>
  </g>
</svg>
