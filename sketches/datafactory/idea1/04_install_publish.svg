<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" fill="none">
  <title>Curio — Install &amp; Publish Dataset Flows</title>
  <desc>Two modal flows side by side on a dimmed canvas backdrop. LEFT: Install Dataset modal — adding a catalog dataset to the local dataset palette. RIGHT: Publish Dataset modal — sharing an installed or computed dataset to Data Catalog. Curio visual identity: Rubik, #1E1F23, #FBAA69.</desc>

  <defs>
    <style>
      .f { font-family: Rubik, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif; }
      .nav     { font-size:14px; font-weight:700; fill:#FBFCF6; }
      .nav-dim { font-size:14px; font-weight:500; fill:rgba(251,252,246,0.65); }
      .h2      { font-size:19px; font-weight:700; fill:#1E1F23; }
      .h3      { font-size:14px; font-weight:700; fill:#1E1F23; }
      .body    { font-size:13px; font-weight:400; fill:#434548; }
      .small   { font-size:11px; font-weight:400; fill:#777777; }
      .small-b { font-size:11px; font-weight:600; fill:#555555; }
      .label   { font-size:10px; font-weight:700; fill:#888888; letter-spacing:0.06em; }
      .badge   { font-size:10px; font-weight:700; letter-spacing:0.05em; }
      .btn-w   { font-size:13px; font-weight:700; fill:#FFFFFF; }
      .btn-d   { font-size:13px; font-weight:600; fill:#1E1F23; }
      .muted   { font-size:12px; fill:#888888; }
      .section { font-size:11px; font-weight:600; fill:#747474; letter-spacing:0.05em; }
      .flow-lbl { font-size:11px; font-weight:700; fill:#BBBBBB; letter-spacing:0.08em; }
    </style>
    <filter id="modal-sh" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="card-sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <pattern id="dot-grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.2" fill="#B8B8B0" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- ════════ CANVAS BACKDROP (dimmed) ════════ -->
  <rect width="1440" height="900" fill="#D4D4D0"/>
  <rect width="1440" height="900" fill="url(#dot-grid)"/>

  <!-- ════════ NAV BAR ════════ -->
  <g id="NavBar">
    <rect width="1440" height="65" fill="#1E1F23"/>
    <line x1="0" y1="65" x2="1440" y2="65" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <text class="f nav" x="22" y="41">Curio</text>
    <text class="f nav-dim" x="106" y="41">File</text>
    <text class="f nav-dim" x="154" y="41">View</text>
    <text class="f nav-dim" x="206" y="41">Data Catalog</text>
    <text class="f nav-dim" x="303" y="41">Provenance</text>
    <circle cx="1408" cy="32" r="15" fill="#FBAA69"/>
    <text class="f" x="1408" y="37" text-anchor="middle" font-size="12px" font-weight="700" fill="#1E1F23">KA</text>
  </g>

  <!-- Dim overlay over canvas -->
  <rect y="65" width="1440" height="835" fill="#1E1F23" opacity="0.5"/>

  <!-- Flow direction labels -->
  <text class="f flow-lbl" x="348" y="120" text-anchor="middle">INSTALL FLOW  ·  HUB → PALETTE</text>
  <text class="f flow-lbl" x="1092" y="120" text-anchor="middle">PUBLISH FLOW  ·  PALETTE → HUB</text>
  <line x1="720" y1="100" x2="720" y2="880" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ════════════════════════════════
       LEFT MODAL: INSTALL DATASET
  ════════════════════════════════ -->
  <g id="Modal_Install" filter="url(#modal-sh)" transform="translate(96, 132)">
    <rect width="504" height="536" rx="12" fill="#FFFFFF"/>

    <!-- Modal header -->
    <rect width="504" height="60" rx="12" fill="#FAFAFA"/>
    <rect x="0" y="48" width="504" height="12" fill="#FAFAFA"/>
    <line x1="0" y1="60" x2="504" y2="60" stroke="#EBEBEB" stroke-width="1"/>

    <!-- Install direction indicator -->
    <rect x="20" y="16" width="68" height="20" rx="10" fill="#F0F0F0"/>
    <!-- globe icon small -->
    <circle cx="30" cy="26" r="5" stroke="#888" stroke-width="1" fill="none"/>
    <line x1="30" y1="21" x2="30" y2="31" stroke="#888" stroke-width="0.7"/>
    <line x1="25" y1="26" x2="35" y2="26" stroke="#888" stroke-width="0.7"/>
    <text x="55" y="30" text-anchor="middle" font-size="10px" fill="#777">Hub</text>
    <!-- arrow -->
    <path d="M100 26 L116 26 M110 22 L116 26 L110 30" stroke="#2F8F4A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- palette badge -->
    <rect x="124" y="16" width="72" height="20" rx="10" fill="#1E1F23"/>
    <text x="160" y="30" text-anchor="middle" font-size="10px" font-weight="700" fill="white">Palette</text>

    <!-- Close button -->
    <g transform="translate(466, 18)">
      <circle cx="10" cy="10" r="12" fill="#F0F0F0"/>
      <line x1="5" y1="5" x2="15" y2="15" stroke="#6B6B76" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="15" y1="5" x2="5" y2="15" stroke="#6B6B76" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Title -->
    <text class="f h2" x="20" y="94">Install Dataset</text>
    <text class="f muted" x="20" y="114">Add this dataset to your local dataset palette.</text>

    <!-- Dataset preview card -->
    <rect x="20" y="128" width="464" height="72" rx="8" fill="#FAFAFA" stroke="#EBEBEB" stroke-width="1" filter="url(#card-sh)"/>
    <rect x="20" y="128" width="4" height="72" rx="2" fill="#2F8F4A"/>
    <rect x="32" y="138" width="62" height="18" rx="9" fill="#DFF2E1"/>
    <text class="f badge" x="63" y="151" text-anchor="middle" fill="#2F8F4A">GeoJSON</text>
    <!-- Hub badge -->
    <rect x="102" y="138" width="64" height="18" rx="9" fill="#F0F0F0"/>
    <circle cx="113" cy="147" r="5" stroke="#888" stroke-width="0.9" fill="none"/>
    <line x1="113" y1="142" x2="113" y2="152" stroke="#888" stroke-width="0.6"/>
    <line x1="108" y1="147" x2="118" y2="147" stroke="#888" stroke-width="0.6"/>
    <text x="149" y="151" text-anchor="middle" font-size="9px" fill="#777">Hub</text>
    <text class="f h3" x="32" y="170">chicago_boundary.geojson</text>
    <text class="f small" x="32" y="185">Urban Lab · v2.3.0 · 2,408 features · 1.8 MB · CC BY 4.0</text>

    <!-- Install target info -->
    <line x1="20" y1="214" x2="484" y2="214" stroke="#F0F0F0" stroke-width="1"/>
    <text class="f section" x="20" y="234">INSTALLING INTO</text>
    <rect x="20" y="242" width="464" height="44" rx="8" fill="#F8FDF9" stroke="#DFF2E1" stroke-width="1"/>
    <!-- dataflow icon -->
    <path d="M32 258 L32 278 L52 278 L52 264 L46 258 Z" stroke="#2F8F4A" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
    <path d="M46 258 L46 264 L52 264" stroke="#2F8F4A" stroke-width="1.2" fill="none"/>
    <text class="f h3" x="60" y="265" fill="#2F8F4A">Chicago Workflow</text>
    <text class="f small" x="60" y="278">Current dataflow · 5 existing datasets</text>
    <text class="f" x="464" y="269" text-anchor="end" font-size="11px" font-weight="600" fill="#2F8F4A">Change ↓</text>

    <!-- What this will do section -->
    <line x1="20" y1="300" x2="484" y2="300" stroke="#F0F0F0" stroke-width="1"/>
    <text class="f section" x="20" y="320">THIS WILL</text>

    <!-- Permission rows -->
    <g transform="translate(20, 330)">
      <circle cx="8" cy="8" r="9" fill="#DFF2E1"/>
      <path d="M4 8 L7 11 L12 4" stroke="#2F8F4A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <text class="f body" x="24" y="13">Add dataset to your palette</text>
    </g>
    <g transform="translate(20, 362)">
      <circle cx="8" cy="8" r="9" fill="#DFF2E1"/>
      <path d="M4 8 L7 11 L12 4" stroke="#2F8F4A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <text class="f body" x="24" y="13">Keep a reference to the hub version (auto-updates)</text>
    </g>
    <g transform="translate(20, 394)">
      <circle cx="8" cy="8" r="9" fill="#FDF0E8"/>
      <text x="8" y="12" text-anchor="middle" font-size="9px" font-weight="700" fill="#FBAA69">!</text>
      <text class="f body" x="24" y="13">Allow this dataset to appear in node inputs</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="424" x2="484" y2="424" stroke="#EBEBEB" stroke-width="1"/>

    <!-- Version note -->
    <text class="f small" x="20" y="444">Version pinning: always latest  ·  You can change this after install.</text>

    <!-- CTA buttons -->
    <g transform="translate(20, 460)">
      <!-- Cancel -->
      <rect width="108" height="42" rx="7" fill="transparent" stroke="#DDDDDD" stroke-width="1.5"/>
      <text class="f btn-d" x="54" y="27" text-anchor="middle">Cancel</text>
      <!-- Install button (primary) -->
      <g transform="translate(124, 0)">
        <rect width="340" height="42" rx="7" fill="#1E1F23"/>
        <!-- download icon -->
        <line x1="40" y1="21" x2="40" y2="29" stroke="white" stroke-width="1.5"/>
        <path d="M36 26 L40 31 L44 26" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <line x1="34" y1="33" x2="46" y2="33" stroke="white" stroke-width="1.5"/>
        <text class="f btn-w" x="196" y="27" text-anchor="middle">Install to Palette</text>
      </g>
    </g>

    <!-- Trust line -->
    <text class="f small" x="252" y="522" text-anchor="middle">You can uninstall anytime from Data Settings.</text>
  </g>

  <!-- ════════════════════════════════
       RIGHT MODAL: PUBLISH TO HUB
  ════════════════════════════════ -->
  <g id="Modal_Publish" filter="url(#modal-sh)" transform="translate(840, 132)">
    <rect width="504" height="596" rx="12" fill="#FFFFFF"/>

    <!-- Modal header -->
    <rect width="504" height="60" rx="12" fill="#FAFAFA"/>
    <rect x="0" y="48" width="504" height="12" fill="#FAFAFA"/>
    <line x1="0" y1="60" x2="504" y2="60" stroke="#EBEBEB" stroke-width="1"/>

    <!-- Direction: Palette to Hub -->
    <rect x="20" y="16" width="72" height="20" rx="10" fill="#1E1F23"/>
    <text x="56" y="30" text-anchor="middle" font-size="10px" font-weight="700" fill="white">Palette</text>
    <!-- arrow -->
    <path d="M104 26 L120 26 M114 22 L120 26 L114 30" stroke="#FBAA69" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Hub badge -->
    <rect x="128" y="16" width="70" height="20" rx="10" fill="#FDF0E8"/>
    <circle cx="138" cy="26" r="5" stroke="#FBAA69" stroke-width="1" fill="none"/>
    <line x1="138" y1="21" x2="138" y2="31" stroke="#FBAA69" stroke-width="0.7"/>
    <line x1="133" y1="26" x2="143" y2="26" stroke="#FBAA69" stroke-width="0.7"/>
    <text x="176" y="30" text-anchor="middle" font-size="10px" font-weight="700" fill="#FBAA69">Hub</text>

    <!-- Close -->
    <g transform="translate(466, 18)">
      <circle cx="10" cy="10" r="12" fill="#F0F0F0"/>
      <line x1="5" y1="5" x2="15" y2="15" stroke="#6B6B76" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="15" y1="5" x2="5" y2="15" stroke="#6B6B76" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <text class="f h2" x="20" y="94">Publish to Data Catalog</text>
    <text class="f muted" x="20" y="114">Share this dataset with all hub users.</text>

    <!-- Dataset preview card -->
    <rect x="20" y="128" width="464" height="64" rx="8" fill="#FAFAFA" stroke="#EBEBEB" stroke-width="1" filter="url(#card-sh)"/>
    <rect x="20" y="128" width="4" height="64" rx="2" fill="#2F8F4A"/>
    <rect x="32" y="137" width="62" height="17" rx="8" fill="#DFF2E1"/>
    <text class="f badge" x="63" y="149" text-anchor="middle" fill="#2F8F4A">GeoJSON</text>
    <!-- Computed badge if applicable -->
    <rect x="102" y="137" width="68" height="17" rx="8" fill="#F1F5F9"/>
    <text x="136" y="149" text-anchor="middle" font-size="9px" font-weight="700" fill="#6B6B76">COMPUTED</text>
    <text class="f h3" x="32" y="165">filtered_buildings.geojson</text>
    <text class="f small" x="32" y="180">Spatial Filter node · 8,214 features · 3.2 MB</text>

    <!-- Divider + publish form -->
    <line x1="20" y1="206" x2="484" y2="206" stroke="#F0F0F0" stroke-width="1"/>
    <text class="f section" x="20" y="226">PUBLISH DETAILS</text>

    <!-- Title field -->
    <text class="f small-b" x="20" y="248">Title</text>
    <rect x="20" y="254" width="464" height="36" rx="7" fill="white" stroke="#DDDDE0" stroke-width="1.5"/>
    <text class="f" x="36" y="277" font-size="13px" fill="#1E1F23">Chicago Buildings — Filtered (500m buffer)</text>

    <!-- Description field -->
    <text class="f small-b" x="20" y="308">Description</text>
    <rect x="20" y="314" width="464" height="56" rx="7" fill="white" stroke="#DDDDE0" stroke-width="1.5"/>
    <text class="f" x="36" y="332" font-size="13px" fill="#888">Describe this dataset for other users…</text>

    <!-- Tags -->
    <text class="f small-b" x="20" y="386">Tags</text>
    <rect x="20" y="392" width="464" height="34" rx="7" fill="white" stroke="#DDDDE0" stroke-width="1.5"/>
    <rect x="28" y="399" width="56" height="20" rx="10" fill="#F0F0F0"/>
    <text x="56" y="413" text-anchor="middle" font-size="10px" fill="#555">buildings</text>
    <rect x="90" y="399" width="52" height="20" rx="10" fill="#F0F0F0"/>
    <text x="116" y="413" text-anchor="middle" font-size="10px" fill="#555">chicago</text>
    <rect x="148" y="399" width="64" height="20" rx="10" fill="#F0F0F0"/>
    <text x="180" y="413" text-anchor="middle" font-size="10px" fill="#555">geospatial</text>
    <text class="f" x="436" y="413" font-size="11px" fill="#BBBBBB">+ Add tag</text>

    <!-- Visibility -->
    <line x1="20" y1="438" x2="484" y2="438" stroke="#F0F0F0" stroke-width="1"/>
    <text class="f section" x="20" y="458">VISIBILITY</text>

    <!-- Radio options -->
    <!-- Public (selected) -->
    <circle cx="30" cy="474" r="8" stroke="#1E1F23" stroke-width="2" fill="none"/>
    <circle cx="30" cy="474" r="4" fill="#1E1F23"/>
    <text class="f body" x="46" y="479">Public — anyone can discover and install</text>
    <!-- Organization -->
    <circle cx="30" cy="500" r="8" stroke="#CCCCCC" stroke-width="1.5" fill="none"/>
    <text class="f" x="46" y="505" font-size="13px" fill="#888">Organization only — visible to your org</text>
    <!-- Private -->
    <circle cx="30" cy="526" r="8" stroke="#CCCCCC" stroke-width="1.5" fill="none"/>
    <text class="f" x="46" y="531" font-size="13px" fill="#888">Private — only you can see it</text>

    <!-- Divider -->
    <line x1="20" y1="546" x2="484" y2="546" stroke="#EBEBEB" stroke-width="1"/>

    <!-- CTA buttons -->
    <g transform="translate(20, 558)">
      <rect width="108" height="42" rx="7" fill="transparent" stroke="#DDDDDD" stroke-width="1.5"/>
      <text class="f btn-d" x="54" y="27" text-anchor="middle">Cancel</text>
      <g transform="translate(124, 0)">
        <rect width="340" height="42" rx="7" fill="#1E1F23"/>
        <!-- upload icon -->
        <line x1="40" y1="21" x2="40" y2="13" stroke="white" stroke-width="1.5"/>
        <path d="M36 17 L40 12 L44 17" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <line x1="34" y1="33" x2="46" y2="33" stroke="white" stroke-width="1.5"/>
        <text class="f btn-w" x="196" y="27" text-anchor="middle">Publish to Data Catalog</text>
      </g>
    </g>
  </g>

  <!-- ── ANNOTATION CALLOUT: explaining the two flows ── -->
  <g transform="translate(580, 770)">
    <rect width="280" height="64" rx="8" fill="#1E1F23" opacity="0.92"/>
    <rect width="280" height="3" rx="1.5" fill="#FBAA69"/>
    <text class="f" x="14" y="20" font-size="11px" font-weight="700" fill="#FBAA69">Install and publish paths</text>
    <text class="f" x="14" y="36" font-size="10px" fill="rgba(251,252,246,0.7)">Data Catalog → Palette via Install</text>
    <text class="f" x="14" y="50" font-size="10px" fill="rgba(251,252,246,0.7)">Palette → Data Catalog via Publish</text>
  </g>

</svg>
