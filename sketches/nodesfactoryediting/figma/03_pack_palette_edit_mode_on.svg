<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 480" width="420" height="480">
  <title>03 - Pack palette edit mode ON</title>
  <desc>Edit toggle, Save draft / Cancel. Curio accent #FBAA69.</desc>
  <defs>
    <style type="text/css">
      .f { font-family: Rubik, -apple-system, sans-serif; }
      .accent { fill: #FBAA69; font-size: 10px; font-weight: 700; }
      .btn { fill: #fbfcf6; font-size: 10px; font-weight: 600; }
      .muted { fill: rgba(255,255,255,0.55); font-size: 9px; font-weight: 700; }
    </style>
  </defs>
  <rect width="420" height="480" fill="#e8e8e8"/>
  <g transform="translate(16,40)">
    <rect x="0" y="0" width="388" height="36" rx="5" fill="#1E1F23" stroke="#FBAA69" stroke-width="1.5"/>
    <text class="f accent" x="12" y="23">EDIT</text>
    <rect x="200" y="6" width="88" height="24" rx="4" fill="#FBAA69"/>
    <text class="f btn" x="244" y="22" text-anchor="middle" fill="#1E1F23">Save draft</text>
    <rect x="296" y="6" width="80" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text class="f btn" x="336" y="22" text-anchor="middle">Cancel</text>
    <rect x="0" y="48" width="220" height="280" rx="5" fill="#1E1F23" stroke="rgba(255,255,255,0.08)"/>
    <text class="f muted" x="110" y="72" text-anchor="middle">Nodes by pack (editing)</text>
  </g>
</svg>
