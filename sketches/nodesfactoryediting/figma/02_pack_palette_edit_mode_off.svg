      .panel-title { fill: rgba(255,255,255,0.55); font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
      .lbl { fill: #fbfcf6; font-size: 11px; font-weight: 600; }
    </style>
  </defs>
  <rect width="420" height="480" fill="#e8e8e8"/>
  <g id="Dock" transform="translate(16,48)">
    <rect x="0" y="0" width="88" height="200" rx="5" fill="#1E1F23" stroke="rgba(255,255,255,0.08)"/>
    <text class="f muted" x="44" y="22" text-anchor="middle">Built-in</text>
    <g id="FakeIcons" transform="translate(12,36)">
