      <rect y="36" width="28" height="28" rx="4" fill="#2a2b30"/>
      <rect x="36" y="36" width="28" height="28" rx="4" fill="#2a2b30"/>
    </g>
    <rect x="96" y="0" width="56" height="120" rx="5" fill="#1E1F23" stroke="rgba(255,255,255,0.08)"/>
