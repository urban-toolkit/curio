<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="520" height="360">
  <title>04 - Pack section selected + canvas sync</title>
  <desc>Blue border on active pack group; dashed link to canvas node window.</desc>
  <defs>
    <style type="text/css">
      .f { font-family: Rubik, -apple-system, sans-serif; }
    </style>
  </defs>
  <rect width="520" height="360" fill="#f0f0f0"/>
  <g id="PalettePanel" transform="translate(24,40)">
    <rect x="0" y="0" width="200" height="140" rx="5" fill="#1E1F23" stroke="#2a6df4" stroke-width="2.5"/>
    <text class="f" x="12" y="24" fill="#fbfcf6" font-size="10px" font-weight="600">Milan heat · it.urbanlab.milan-heat@1</text>
    <text class="f" x="180" y="24" fill="rgba(255,255,255,0.5)" font-size="9px" text-anchor="end">7</text>
  </g>
  <g id="CanvasNode" transform="translate(300,60)">
    <rect width="180" height="100" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
    <rect width="180" height="22" fill="#e8e8e8"/>
    <text class="f" x="8" y="16" fill="#333" font-size="10px">Reproject census</text>
  </g>
  <path d="M 224 120 C 260 120 280 140 300 120" fill="none" stroke="#2a6df4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text class="f" x="250" y="110" fill="#2a6df4" font-size="9px">selection sync</text>
</svg>
