<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1670 660" width="1670" height="660" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <title>Curio — Sign up</title>
  <desc>Standalone sign-up page. Left: black brand panel with the Curio logo. Right: sign-up form with name/email/password/confirm, Google, and guest options.</desc>

  <rect id="PageBackground" x="0" y="0" width="1670" height="660" fill="#FFFFFF"/>

  <g id="BrandPanel">
    <rect id="BrandPanel_Bg" x="0" y="0" width="700" height="660" fill="#0F0F11"/>
    <image id="BrandPanel_Logo" xlink:href="curio_logo_white.png" href="curio_logo_white.png"
           x="180" y="110" width="340" height="333" preserveAspectRatio="xMidYMid meet"/>
    <text id="BrandPanel_Tagline" x="350" y="510" text-anchor="middle"
          font-size="17" fill="#D8D8D8" letter-spacing="1">Visual workflows for urban data</text>
  </g>

  <g id="SignUpForm">
    <text id="SignUpForm_Title" x="1185" y="72" text-anchor="middle"
          font-size="26" font-weight="700" fill="#0F0F11">Create account</text>
    <text id="SignUpForm_Subtitle" x="1185" y="96" text-anchor="middle"
          font-size="13" fill="#434548">Get started with Curio — it's free</text>

    <g id="SignUpForm_Name">
      <text id="SignUpForm_NameLabel" x="975" y="128" font-size="11" font-weight="600" fill="#0F0F11">Name</text>
      <rect id="SignUpForm_NameField" x="975" y="134" width="420" height="34" rx="6" ry="6"
            fill="white" stroke="#747474" stroke-width="1.5"/>
      <text id="SignUpForm_NamePlaceholder" x="992" y="157" font-size="12" fill="#7F7F7F">your full name</text>
    </g>

    <g id="SignUpForm_Email">
      <text id="SignUpForm_EmailLabel" x="975" y="188" font-size="11" font-weight="600" fill="#0F0F11">Email</text>
      <rect id="SignUpForm_EmailField" x="975" y="194" width="420" height="34" rx="6" ry="6"
            fill="white" stroke="#747474" stroke-width="1.5"/>
      <text id="SignUpForm_EmailPlaceholder" x="992" y="217" font-size="12" fill="#7F7F7F">you@example.com</text>
    </g>

    <g id="SignUpForm_Password">
      <text id="SignUpForm_PasswordLabel" x="975" y="248" font-size="11" font-weight="600" fill="#0F0F11">Password</text>
      <rect id="SignUpForm_PasswordField" x="975" y="254" width="420" height="34" rx="6" ry="6"
            fill="white" stroke="#747474" stroke-width="1.5"/>
      <text id="SignUpForm_PasswordPlaceholder" x="992" y="278" font-size="14" fill="#7F7F7F" letter-spacing="2">••••••••</text>
    </g>

    <g id="SignUpForm_ConfirmPassword">
      <text id="SignUpForm_ConfirmPasswordLabel" x="975" y="308" font-size="11" font-weight="600" fill="#0F0F11">Confirm password</text>
      <rect id="SignUpForm_ConfirmPasswordField" x="975" y="314" width="420" height="34" rx="6" ry="6"
            fill="white" stroke="#747474" stroke-width="1.5"/>
      <text id="SignUpForm_ConfirmPasswordPlaceholder" x="992" y="338" font-size="14" fill="#7F7F7F" letter-spacing="2">••••••••</text>
    </g>

    <g id="SignUpForm_SubmitButton">
      <rect id="SignUpForm_SubmitButtonBg" x="975" y="362" width="420" height="42" rx="8" ry="8" fill="#0F0F11"/>
      <text id="SignUpForm_SubmitButtonLabel" x="1185" y="389" text-anchor="middle"
            font-size="14" font-weight="600" fill="white">Create account</text>
    </g>

    <g id="SignUpForm_Divider">
      <line id="SignUpForm_DividerLineLeft" x1="975" y1="424" x2="1157" y2="424" stroke="#D8D8D8" stroke-width="1"/>
      <text id="SignUpForm_DividerLabel" x="1185" y="428" text-anchor="middle" font-size="11" fill="#747474" letter-spacing="2">OR</text>
      <line id="SignUpForm_DividerLineRight" x1="1213" y1="424" x2="1395" y2="424" stroke="#D8D8D8" stroke-width="1"/>
    </g>

    <g id="SignUpForm_GoogleButton">
      <rect id="SignUpForm_GoogleButtonBg" x="975" y="444" width="205" height="38" rx="8" ry="8"
            fill="white" stroke="#747474" stroke-width="1.5"/>
      <g id="SignUpForm_GoogleLogo" transform="translate(1002,453) scale(0.4)">
        <path d="M47.532 24.553c0-1.63-.146-3.197-.418-4.702H24.48v8.892h12.92c-.556 2.994-2.25 5.53-4.792 7.226v6.007h7.758c4.534-4.175 7.166-10.327 7.166-17.423Z" fill="#4285F4"/>
        <path d="M24.48 48c6.48 0 11.914-2.146 15.886-5.824l-7.758-6.007c-2.149 1.44-4.898 2.296-8.128 2.296-6.257 0-11.556-4.221-13.45-9.898H3.033v6.2C6.99 42.61 14.969 48 24.48 48Z" fill="#34A853"/>
        <path d="M11.03 28.567A14.37 14.37 0 0 1 10.278 24c0-1.585.274-3.124.752-4.567v-6.2H3.033A23.99 23.99 0 0 0 .48 24c0 3.865.928 7.527 2.553 10.767l7.997-6.2Z" fill="#FBBC04"/>
        <path d="M24.48 9.535c3.524 0 6.687 1.21 9.176 3.59l6.885-6.884C36.386 2.378 30.961 0 24.48 0 14.969 0 6.99 5.39 3.033 13.233l7.997 6.2c1.894-5.677 7.193-9.898 13.45-9.898Z" fill="#EA4335"/>
      </g>
      <text id="SignUpForm_GoogleButtonLabel" x="1100" y="468" text-anchor="middle"
            font-size="13" font-weight="600" fill="#0F0F11">Google</text>
    </g>

    <g id="SignUpForm_GuestButton">
      <rect id="SignUpForm_GuestButtonBg" x="1190" y="444" width="205" height="38" rx="8" ry="8"
            fill="white" stroke="#747474" stroke-width="1.5"/>
      <g id="SignUpForm_GuestIcon" transform="translate(1216,451) scale(0.72)"
         stroke="#0F0F11" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="13" cy="9" r="4.2"/>
        <path d="M4 25c1.6-5.2 5.4-8 9-8s7.4 2.8 9 8"/>
      </g>
      <text id="SignUpForm_GuestButtonLabel" x="1309" y="468" text-anchor="middle"
            font-size="13" font-weight="600" fill="#0F0F11">Guest</text>
    </g>

    <text id="SignUpForm_SignInLink" x="1185" y="528" text-anchor="middle" font-size="13" fill="#434548">Already have an account? <tspan font-weight="600" fill="#0F0F11" text-decoration="underline">Sign in</tspan></text>
  </g>
</svg>
