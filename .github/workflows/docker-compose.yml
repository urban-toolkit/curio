name: Full stack build

on:
  push:
    branches:
      - main
      - karla
    paths:
      - 'utk_curio/**'
      - 'Dockerfile'
      - '.github/workflows/docker-compose.yml'
      # Baked into the image (see Dockerfile runtime_base COPYs):
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**'
      - 'docs/examples/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'utk_curio/**'
      - 'Dockerfile'
      - '.github/workflows/docker-compose.yml'
      # Baked into the image (see Dockerfile runtime_base COPYs):
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**'
      - 'docs/examples/**'
  # workflow_dispatch:  # Run manually from Actions tab or: gh workflow run docker-compose.yml

jobs:
  test-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🧹 Reclaim runner disk headroom
        run: |
          # Free the large preinstalled toolchains we never use so the 24 GB
          # swapfile (next step) and the docker build cache have ample disk.
          # NB: do NOT touch /opt/hostedtoolcache — setup-python lives there.
          echo "=== before ==="; df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/share/swift \
            /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          echo "=== after ==="; df -h /

      - name: 💾 Add swap space
        run: |
          # Software WebGPU (SwiftShader) rendering of the heaviest example
          # (09-heterogeneous-data-linked-views) peaks ~12 GB in the browser
          # plus a ~6 GB sandbox compute spike, exceeding the 16 GB runner and
          # tripping the OOM killer. A large swapfile lets the peak survive on
          # disk (slower, but the 120 min job timeout absorbs it). Replaces the
          # runner's stock ~4 GB swap with 24 GB → ~40 GB total virtual memory.
          sudo swapoff -a || true
          sudo fallocate -l 24G /swapfile \
            || sudo dd if=/dev/zero of=/swapfile bs=1M count=24576
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          swapon --show
          free -h

      - name: 🦊 Set up Firefox + lavapipe for WebGPU compute (DIAG)
        run: |
          # Chrome's bundled SwiftShader crashes on the compute passes in
          # 06/07. Firefox's WebGPU is wgpu (Rust) over the *system* Vulkan
          # loader, so it can run them on Mesa lavapipe (more conformant
          # software Vulkan). Install lavapipe + Playwright Firefox and route
          # the e2e suite through Firefox (PYTEST_ADDOPTS=--browser firefox).
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools
          ICD=$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1)
          echo "lavapipe ICD: ${ICD:-NOT FOUND}"
          echo "VK_ICD_FILENAMES=$ICD" >> "$GITHUB_ENV"
          echo "PYTEST_ADDOPTS=--browser firefox" >> "$GITHUB_ENV"
          VK_ICD_FILENAMES="$ICD" vulkaninfo --summary 2>/dev/null \
            | grep -iE "deviceName|driverName" | head || true

      - name: 🔨 Build all service images in parallel
        run: docker compose -p curio build --parallel

      - name: ▶️ Start containers
        run: docker compose -p curio up -d

      - name: 🧪 Wait for services to become healthy
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for curio to be healthy..."

          timeout 240 bash -euo pipefail -c '
            while true; do
              cid="$(docker compose -p curio ps -a -q curio | head -n1 || true)"

              if [[ -z "${cid}" ]]; then
                echo "Still waiting... (curio container not created yet)"
                docker compose -p curio ps -a || true
                sleep 2
                continue
              fi

              state="$(docker inspect --format "{{.State.Status}}" "${cid}" 2>/dev/null || true)"
              health="$(docker inspect --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}" "${cid}" 2>/dev/null || true)"

              if [[ "${health}" == "healthy" ]]; then
                echo "curio is healthy."
                break
              fi

              # If there is no Docker HEALTHCHECK, accept "running"
              if [[ "${health}" == "no-healthcheck" && "${state}" == "running" ]]; then
                echo "curio is running (no healthcheck)."
                break
              fi

              # If it crashed, fail fast with logs
              if [[ "${state}" == "exited" ]]; then
                echo "curio exited. Logs:"
                docker compose -p curio logs --no-color --tail=200 curio || true
                exit 1
              fi

              echo "Still waiting... (state=${state:-unknown}, health=${health:-unknown})"
              sleep 2
            done
          '

      - name: 🧪 Run backend unit tests
        run: |
          docker compose -p curio exec curio \
            bash scripts/test.sh --backend-only --use-existing

      - name: 🧪 Run sandbox unit tests
        run: |
          docker compose -p curio exec curio \
            bash scripts/test.sh --sandbox-only --use-existing

      - name: 🐍 Set up Python (for e2e)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 🔧 Give .curio/ permissions for host-side tests
        run: |
          # Docker creates .curio/ as root; the host runner needs write
          # access to create .curio/playwright/expected/ for programmatic
          # ground-truth data.
          sudo chmod -R a+rwx .curio/ 2>/dev/null || mkdir -p .curio/playwright/expected

      - name: 📈 Resource snapshot (before e2e)
        run: |
          echo "=== free -h ==="
          free -h
          echo "=== df -h ==="
          df -h
          echo "=== docker system df ==="
          docker system df || true
          echo "=== docker stats (no-stream) ==="
          docker stats --no-stream || true
          echo "=== top (snapshot) ==="
          top -bn1 | head -30 || true

      - name: 🎭 Run e2e tests
        run: |
          # Background sampler: streams a resource snapshot every 30 s to the
          # step log so we can see RAM/disk trajectory if the runner dies
          # mid-step (the failing run lost step-10 logs entirely after the
          # runner went silent).
          (
            while true; do
              echo "=== SAMPLER $(date -u +%H:%M:%S) ==="
              free -h | sed -n '1,3p'
              df -h / | tail -1
              docker stats --no-stream --format 'table {{.Name}}\t{{.MemUsage}}\t{{.CPUPerc}}' 2>/dev/null || true
              sleep 30
            done
          ) &
          SAMPLER_PID=$!
          trap "kill $SAMPLER_PID 2>/dev/null || true" EXIT
          # DIAGNOSTIC (temporary): Firefox + lavapipe on the 2 GPU-compute
          # examples (06/07) that crash Chrome's SwiftShader. test.sh installs
          # the Firefox browser itself (playwright pip is available there).
          bash scripts/test.sh --e2e-only --use-existing \
            --workflows 06-autark-what-if-shadow-study.json,07-autark-gpu-shader.json \
            --allure-dir "$GITHUB_WORKSPACE/allure-results"

      - name: 📈 Resource snapshot (after e2e)
        if: always()
        run: |
          echo "=== free -h ==="
          free -h
          echo "=== df -h ==="
          df -h
          echo "=== docker system df ==="
          docker system df || true
          echo "=== docker stats (no-stream) ==="
          docker stats --no-stream || true

      - name: 📊 Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.32.0
          wget -q "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf "allure-${ALLURE_VERSION}.tgz"
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: 📊 Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: 📤 Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Check frontend availability
        run: |
          curl --fail http://localhost:8080 || (echo "Frontend not reachable" && exit 1)

      - name: Jest frontend unit tests
        run: |
          docker build --target frontend_builder -t curio-frontend-test .
          docker run --rm curio-frontend-test npm test

      - name: 🧹 Tear down containers
        run: docker compose -p curio down
