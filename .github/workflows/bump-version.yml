name: Bump version

on:
  push:
    branches: [main]
    paths:
      - 'utk_curio/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if this is a version bump commit
        run: |
          MSG=$(git log -1 --format="%s")
          if [[ "$MSG" == chore:\ bump\ version\ to\ * ]]; then
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Classify bump type via GitHub Models
        if: env.SKIP != 'true'
        run: |
          # Use the previous bump commit as the boundary instead of a git
          # tag — bump-version doesn't (and shouldn't) create tags, so an
          # ancient v* tag would otherwise drag old commits into every run's
          # classification window.
          LAST_BUMP=$(git log --author="github-actions\[bot\]" \
                              --grep="^chore: bump version to " \
                              -n 1 --format="%H")
          if [ -z "$LAST_BUMP" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_BUMP}..HEAD"
          fi
          COMMITS=$(git log $RANGE --format="- %s" | grep -v "^- chore: bump version" || true)

          if [ -z "$COMMITS" ]; then
            echo "BUMP=patch" >> $GITHUB_ENV
            exit 0
          fi

          PROMPT="Curio is a dataflow visual analytics tool with example workflows under docs/examples/. The commit list below represents ONE upcoming release. Classify the release as a whole — not each commit individually — as MINOR or PATCH.

          MINOR if ANY commit introduces:
          - A new user-visible feature, node type, widget, or capability
          - New example workflows, templates, or datasets

          PATCH otherwise (bugfixes, refactors, dep bumps, docs, tests, CI, regenerated fixtures).

          Reply with EXACTLY ONE JSON object — never a list — of shape {\"decision\": \"minor\" or \"patch\", \"reason\": \"<one short sentence summarising the release>\"}.

          Commits in this release:
          $COMMITS"

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{model: "openai/gpt-4o-mini", max_tokens: 250, response_format: {type: "json_object"}, messages: [{role: "user", content: $prompt}]}')

          HTTP_CODE=$(curl -sS -o /tmp/models_response.json -w "%{http_code}" \
            https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::GitHub Models API returned HTTP $HTTP_CODE"
            echo "Response body:"
            cat /tmp/models_response.json
            exit 1
          fi
          RESPONSE=$(cat /tmp/models_response.json)

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          FINISH=$(echo "$RESPONSE" | jq -r '.choices[0].finish_reason // ""')
          if [[ "$FINISH" == "length" ]]; then
            echo "::warning::Model reply was truncated (finish_reason=length); reason field may be unparseable"
          fi
          # Tolerate malformed JSON: a truncated reason string makes the whole
          # content unparseable, but we only need .decision to proceed.
          DECISION=$(echo "$CONTENT" | jq -r '.decision // empty' 2>/dev/null | tr '[:upper:]' '[:lower:]' || true)
          REASON=$(echo "$CONTENT" | jq -r '.reason // ""' 2>/dev/null || true)

          echo "Model decision: '$DECISION'"
          echo "Model reason: $REASON"

          if [[ "$DECISION" == "minor" ]]; then
            BUMP="minor"
          elif [[ "$DECISION" == "patch" ]]; then
            BUMP="patch"
          else
            echo "::error::GitHub Models returned unexpected decision: '$DECISION'"
            echo "Raw content: $CONTENT"
            echo "Raw response: $RESPONSE"
            exit 1
          fi
          echo "BUMP=$BUMP" >> $GITHUB_ENV
          echo "GitHub Models decided: $BUMP ($REASON)"

      - name: Bump version
        if: env.SKIP != 'true'
        run: |
          NEW_VERSION=$(BUMP="${{ env.BUMP }}" python3 <<'PYEOF'
          import os, re, pathlib
          p = pathlib.Path('utk_curio/__init__.py')
          text = p.read_text()
          current = re.search(r'__version__\s*=\s*["\'](.+?)["\']', text).group(1)
          parts = list(map(int, current.split('.')))
          if os.environ['BUMP'] == 'minor':
              parts[1] += 1
              parts[2] = 0
          else:
              parts[2] += 1
          new = '.'.join(map(str, parts))
          p.write_text(re.sub(r'''__version__\s*=\s*["'].*?["']''', f'__version__ = "{new}"', text))
          print(new)
          PYEOF
          )
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add utk_curio/__init__.py
          git commit -m "chore: bump version to $NEW_VERSION"
          git push
