name: Bump version

on:
  push:
    branches: [main]
    paths:
      - 'utk_curio/**'
      - 'docs/**'

permissions:
  contents: write
  models: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if this is a version bump commit
        run: |
          MSG=$(git log -1 --format="%s")
          if [[ "$MSG" == chore:\ bump\ version\ to\ * ]]; then
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Classify bump type via GitHub Models
        if: env.SKIP != 'true'
        run: |
          LAST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git log "${LAST_TAG}..HEAD" --format="- %s" | grep -v "^- chore: bump version" || true)

          if [ -z "$COMMITS" ]; then
            echo "BUMP=patch" >> $GITHUB_ENV
            exit 0
          fi

          PROMPT="Curio is a dataflow visual analytics tool. Given these commits, decide: MINOR (new user-visible feature or capability) or PATCH (bugfix, refactor, deps, docs, tests, CI). Reply with exactly one word: minor or patch.

          Commits:
          $COMMITS"

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{model: "openai/gpt-4o-mini", max_tokens: 10, messages: [{role: "user", content: $prompt}]}')

          HTTP_CODE=$(curl -sS -o /tmp/models_response.json -w "%{http_code}" \
            https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::GitHub Models API returned HTTP $HTTP_CODE"
            echo "Response body:"
            cat /tmp/models_response.json
            exit 1
          fi
          RESPONSE=$(cat /tmp/models_response.json)

          DECISION=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'].strip().lower())")

          if [[ "$DECISION" == "minor" ]]; then
            BUMP="minor"
          elif [[ "$DECISION" == "patch" ]]; then
            BUMP="patch"
          else
            echo "::error::GitHub Models returned unexpected decision: '$DECISION'"
            echo "Raw response: $RESPONSE"
            exit 1
          fi
          echo "BUMP=$BUMP" >> $GITHUB_ENV
          echo "GitHub Models decided: $BUMP"

      - name: Bump version
        if: env.SKIP != 'true'
        run: |
          NEW_VERSION=$(BUMP="${{ env.BUMP }}" python3 <<'PYEOF'
          import os, re, pathlib
          p = pathlib.Path('utk_curio/__init__.py')
          text = p.read_text()
          current = re.search(r'__version__\s*=\s*["\'](.+?)["\']', text).group(1)
          parts = list(map(int, current.split('.')))
          if os.environ['BUMP'] == 'minor':
              parts[1] += 1
              parts[2] = 0
          else:
              parts[2] += 1
          new = '.'.join(map(str, parts))
          p.write_text(re.sub(r'''__version__\s*=\s*["'].*?["']''', f'__version__ = "{new}"', text))
          print(new)
          PYEOF
          )
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add utk_curio/__init__.py
          git commit -m "chore: bump version to $NEW_VERSION"
          git push
