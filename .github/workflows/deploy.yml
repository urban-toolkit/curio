name: Deploy

# One-time setup:
#   1. Tailscale: create OAuth client (scope: auth_keys, tag: tag:ci).
#      Repo secrets: TS_OAUTH_CLIENT_ID, TS_OAUTH_SECRET
#   2. Tailscale ACL: tag:ci -> tag:curio-server:22
#   3. On the server, run:
#        sudo tailscale up --advertise-tags=tag:curio-server --ssh
#      The Tailscale device keeps its OS hostname `utk`.
#   4. SSH key: deploy user has the public key in
#      /home/deploy/.ssh/authorized_keys; private key is GH secret
#      DEPLOY_SSH_KEY.
#   5. On the server, set up two side-by-side checkouts:
#        sudo -iu deploy
#        git clone https://github.com/<you>/curio.git /srv/curio        # stable
#        git clone https://github.com/<you>/curio.git /srv/curio-dev   # test
#
#      And a per-checkout .env so the two stacks don't collide on
#      container names or ports:
#
#        # /srv/curio/.env  (stable — keeps the original ports)
#        CURIO_CONTAINER_NAME=curio
#        CURIO_PORT_2000=2000
#        CURIO_PORT_5002=5002
#        CURIO_PORT_8080=8080
#
#        # /srv/curio-dev/.env
#        CURIO_CONTAINER_NAME=curio-dev
#        CURIO_PORT_2000=2010
#        CURIO_PORT_5002=5012
#        CURIO_PORT_8080=8090
#
#   6. Self-hosted GPU CI runner (for .github/workflows/docker-compose.yml,
#      which runs ONLY on this box — the WebGPU compute examples 06/07 need
#      real hardware WebGPU that GitHub-hosted runners lack). On `utk`:
#        a. Verify the NVIDIA GPU is usable headless:
#             lspci | grep -E 'VGA|3D'; ls -l /dev/dri; nvidia-smi
#             vulkaninfo --summary   # must name the NVIDIA device, NOT llvmpipe
#        b. Install GPU userspace + browser (as root):
#             apt-get install -y vulkan-tools   # plus the NVIDIA driver + ICD
#             # google-chrome-stable — the e2e suite uses real system Chrome
#             # (conftest.py _find_system_chrome), not bundled Chromium.
#        c. Ensure the `deploy` user's env does NOT set VK_ICD_FILENAMES
#           (it would pin Mesa lavapipe -> software WebGPU and the run would
#           fail the CURIO_REQUIRE_HARDWARE_WEBGPU assertion).
#        d. Install the Actions runner as `deploy`, registered to this repo
#           with labels `gpu,curio`, in a runner group scoped to THIS repo
#           only, under systemd (recommended --ephemeral):
#             sudo -iu deploy
#             mkdir ~/actions-runner && cd ~/actions-runner
#             # download + ./config.sh --url https://github.com/urban-toolkit/curio \
#             #   --token <repo runner token> --labels gpu,curio --ephemeral
#        e. SECURITY (public repo + self-hosted): Settings -> Actions -> require
#           approval for ALL outside-collaborator/fork PRs; scope the runner
#           group to this repo. The workflow's `if:` guard already prevents the
#           job from running on fork PRs, so untrusted code never executes here.
#      The CI stack runs as `docker compose -p curio-ci` on remapped ports
#      (2020/5022/8100), fully isolated from the prod curio/curio-dev stacks.

on:
  push:
    branches: [main]
    paths:
      - 'utk_curio/**'
      - 'docs/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA). Leave empty to deploy the latest v* tag.'
        required: false
        default: ''

jobs:
  deploy-dev:
    # Runs on every push (matching the paths filter) AND alongside deploy-stable
    # whenever the workflow is manually dispatched, so dev tracks stable.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    environment: dev
    steps:
      - uses: actions/checkout@v6

      - name: Connect to tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H utk >> ~/.ssh/known_hosts

      - name: Deploy to curio-dev stack
        env:
          REF_INPUT: ${{ inputs.ref || '' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 deploy@utk \
            bash -s "$REF_INPUT" <<'EOF'
          set -euo pipefail
          ref="${1:-}"
          cd /srv/curio-dev
          git fetch --prune --tags origin
          if [ -z "$ref" ]; then
            ref="main"
          fi
          git checkout --detach "origin/$ref" 2>/dev/null \
            || git checkout --detach "$ref"
          echo "Deploying $ref ($(git rev-parse --short HEAD))"
          export COMPOSE_FILE=docker-compose.yml:docker-compose.deploy.yml
          export BACKEND_URL=https://curio-dev.urbantk.org/api
          docker compose -p curio-dev down --remove-orphans 2>/dev/null || true
          docker run --rm -v "$PWD:/work" -w /work alpine rm -rf .curio
          mkdir -p instance .curio
          docker compose -p curio-dev build --no-cache
          docker compose -p curio-dev up -d
          EOF

  deploy-stable:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-stable
      cancel-in-progress: false
    environment: stable
    steps:
      - uses: actions/checkout@v6

      - name: Connect to tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H utk >> ~/.ssh/known_hosts

      - name: Deploy to stable stack
        env:
          REF_INPUT: ${{ inputs.ref || '' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 deploy@utk \
            bash -s "$REF_INPUT" <<'EOF'
          set -euo pipefail
          ref="${1:-}"
          cd /srv/curio
          git fetch --prune --tags origin
          if [ -z "$ref" ]; then
            ref=$(git describe --tags --abbrev=0 --match 'v*' origin/main)
          fi
          git checkout --detach "origin/$ref" 2>/dev/null \
            || git checkout --detach "$ref"
          echo "Deploying $ref ($(git rev-parse --short HEAD))"
          mkdir -p instance .curio
          export COMPOSE_FILE=docker-compose.yml:docker-compose.deploy.yml
          export BACKEND_URL=https://curio.urbantk.org/api
          docker compose -p curio down --remove-orphans 2>/dev/null || true
          docker compose -p curio build --no-cache
          docker compose -p curio up -d
          EOF
